version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/graph"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "swift"
    directory: "/collector"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
