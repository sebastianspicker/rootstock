name: Tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  # ── Swift unit tests ────────────────────────────────────────────────────
  swift-tests:
    name: Swift Tests
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build fixture apps
        run: bash tests/fixtures/apps/create_fixtures.sh

      - name: swift test
        working-directory: collector
        timeout-minutes: 55
        run: swift test --parallel

  # ── Python unit tests ────────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/rootstock
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -a bolt://localhost:7687 -u neo4j -p rootstock 'RETURN 1' || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: graph
        run: pip install -r requirements.txt pytest

      - name: pytest (no Neo4j)
        working-directory: graph
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: rootstock
        run: pytest tests/ -v --tb=short

  # ── Python linting ──────────────────────────────────────────────────────
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check graph/ scripts/ examples/ docs/
