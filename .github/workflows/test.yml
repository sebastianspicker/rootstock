name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Swift unit tests ────────────────────────────────────────────────────
  swift-tests:
    name: Swift Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build fixture apps
        run: bash tests/fixtures/apps/create_fixtures.sh

      - name: swift test
        working-directory: collector
        run: swift test --parallel 2>&1

  # ── Python unit tests ────────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: graph
        run: pip install -r requirements.txt pytest

      - name: pytest (no Neo4j)
        working-directory: graph
        # Neo4j-dependent tests skip automatically when no server is available.
        # File-validation and pure-function tests always run.
        run: pytest tests/ -v --tb=short

  # ── Python linting ──────────────────────────────────────────────────────
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        working-directory: graph
        run: ruff check .
