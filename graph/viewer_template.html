<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rootstock — {{VIEWER_TITLE}}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  background:#0d1117;color:#e0e0e0;overflow:hidden;height:100vh}
a{color:#58a6ff}
::selection{background:#264f78;color:#fff}

/* Layout */
#app{display:flex;height:100vh}
#sidebar{width:280px;min-width:280px;background:#161b22;border-right:1px solid #30363d;
  display:flex;flex-direction:column;overflow:hidden}
#graph-container{flex:1;position:relative;overflow:hidden}
#inspector{width:340px;min-width:340px;background:#161b22;border-left:1px solid #30363d;
  overflow-y:auto;display:none;transition:width .2s}
#inspector.open{display:block}

/* Sidebar */
#sidebar-header{padding:16px;border-bottom:1px solid #30363d;background:linear-gradient(180deg,#1c2333 0%,#161b22 100%)}
#sidebar-header .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
#sidebar-header .brand-icon{width:28px;height:28px;border-radius:6px;
  background:linear-gradient(135deg,#e63946 0%,#d62828 100%);display:flex;align-items:center;
  justify-content:center;font-size:15px;color:#fff;font-weight:700;flex-shrink:0;
  box-shadow:0 2px 8px rgba(230,57,70,.3)}
#sidebar-header h1{font-size:15px;font-weight:700;color:#f0f6fc;letter-spacing:.3px}
#sidebar-header .meta{font-size:11px;color:#8b949e}
#search{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;
  border-radius:6px;color:#e0e0e0;font-size:13px;margin-top:10px;outline:none;
  transition:border-color .15s,box-shadow .15s}
#search:focus{border-color:#58a6ff;box-shadow:0 0 0 3px rgba(88,166,255,.15)}
#search::placeholder{color:#484f58}
#filters{flex:1;overflow-y:auto;padding:12px 16px}
#filters::-webkit-scrollbar{width:6px}
#filters::-webkit-scrollbar-track{background:transparent}
#filters::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
#filters::-webkit-scrollbar-thumb:hover{background:#484f58}
.filter-section{margin-bottom:16px}
.filter-section h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:#8b949e;margin-bottom:8px;font-weight:600}
.filter-item{display:flex;align-items:center;gap:8px;padding:4px 6px;cursor:pointer;
  font-size:12px;border-radius:4px;transition:background .1s}
.filter-item:hover{background:rgba(88,166,255,.08)}
.filter-item input[type=checkbox]{accent-color:#58a6ff;cursor:pointer}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.filter-count{margin-left:auto;color:#484f58;font-size:10px;font-weight:500;
  background:#21262d;padding:1px 6px;border-radius:10px}

/* Legend footer */
#legend-footer{padding:10px 16px;border-top:1px solid #30363d;font-size:11px;color:#8b949e;
  background:#0d1117;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
#legend-footer .legend-stat{display:flex;align-items:center;gap:4px}
#legend-footer .legend-sep{color:#30363d}

/* Risk posture summary */
#risk-posture{padding:10px 16px;border-bottom:1px solid #30363d;background:rgba(13,17,23,.6)}
#risk-posture .risk-summary{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.risk-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;
  font-size:10px;font-weight:600;letter-spacing:.3px;
  border:1px solid rgba(255,255,255,.1)}
.risk-chip.critical{background:rgba(248,81,73,.12);color:#f85149;border-color:rgba(248,81,73,.25)}
.risk-chip.high{background:rgba(210,153,34,.12);color:#d29922;border-color:rgba(210,153,34,.25)}
.risk-chip.medium{background:rgba(88,166,255,.1);color:#58a6ff;border-color:rgba(88,166,255,.2)}
.risk-chip.low{background:rgba(63,185,80,.1);color:#3fb950;border-color:rgba(63,185,80,.2)}
.risk-chip .chip-count{font-family:'SF Mono',Menlo,monospace;font-weight:700}

/* Keyboard hints */
#keyboard-hints{padding:8px 16px;border-top:1px solid #21262d;font-size:10px;color:#484f58;
  display:flex;gap:10px;flex-wrap:wrap;background:#0d1117}
.kbd{display:inline-block;background:#21262d;border:1px solid #30363d;border-radius:3px;
  padding:0 4px;font-family:'SF Mono',Menlo,monospace;font-size:10px;color:#8b949e;
  line-height:18px}

/* Inspector */
#inspector-header{padding:14px 16px;border-bottom:1px solid #30363d;display:flex;
  align-items:center;justify-content:space-between;background:#1c2333}
#inspector-header h2{font-size:14px;font-weight:600;color:#f0f6fc;display:flex;
  align-items:center;gap:8px}
#inspector-close{background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;
  padding:4px 8px;border-radius:4px;transition:all .1s}
#inspector-close:hover{color:#f0f6fc;background:rgba(255,255,255,.08)}
#inspector-body{padding:16px}
#inspector-body::-webkit-scrollbar{width:6px}
#inspector-body::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.prop-section{margin-bottom:16px}
.prop-section h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:#8b949e;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px}
.prop-section h4 .section-count{font-size:9px;background:#21262d;color:#8b949e;
  padding:1px 6px;border-radius:8px;font-weight:500}
.prop-row{display:flex;justify-content:space-between;padding:5px 0;
  border-bottom:1px solid #21262d;font-size:12px;transition:background .1s}
.prop-row:hover{background:rgba(88,166,255,.04)}
.prop-key{color:#8b949e;flex-shrink:0;margin-right:12px;font-size:11px}
.prop-val{color:#e6edf3;text-align:right;word-break:break-all;max-width:190px;font-size:11px}
.prop-val.bool-true{color:#3fb950}
.prop-val.bool-false{color:#f85149}
.kind-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;
  font-weight:600;margin-bottom:8px;letter-spacing:.3px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.risk-indicator{display:flex;gap:4px;margin-bottom:10px}
.risk-dot{width:8px;height:8px;border-radius:50%;background:#30363d}
.risk-dot.active-critical{background:#f85149;box-shadow:0 0 6px rgba(248,81,73,.5)}
.risk-dot.active-high{background:#d29922;box-shadow:0 0 6px rgba(210,153,34,.5)}
.risk-dot.active-medium{background:#58a6ff;box-shadow:0 0 6px rgba(88,166,255,.3)}
.risk-dot.active-low{background:#3fb950}
.inspector-actions{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.inspector-btn{background:#21262d;border:1px solid #30363d;border-radius:6px;
  color:#e6edf3;padding:5px 12px;font-size:11px;cursor:pointer;transition:all .15s;
  font-weight:500}
.inspector-btn:hover{background:#30363d;border-color:#58a6ff;color:#58a6ff}
.inspector-btn.danger:hover{border-color:#f85149;color:#f85149}

/* Tooltip */
#tooltip{position:absolute;background:#1c2333;border:1px solid #30363d;border-radius:8px;
  padding:10px 14px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .12s;
  max-width:320px;z-index:10;white-space:pre-line;
  box-shadow:0 8px 24px rgba(0,0,0,.4),0 0 1px rgba(255,255,255,.1)}
#tooltip.visible{opacity:1}
#tooltip .tt-label{font-weight:600;color:#f0f6fc;font-size:13px;margin-bottom:2px}
#tooltip .tt-kind{font-size:11px;margin-bottom:4px}
#tooltip .tt-detail{font-size:11px;color:#8b949e;border-top:1px solid #30363d;
  padding-top:4px;margin-top:4px}
#tooltip .tt-risk{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;
  font-weight:600;margin-left:4px}
#tooltip .tt-risk.critical{background:rgba(248,81,73,.2);color:#f85149;border:1px solid rgba(248,81,73,.3)}
#tooltip .tt-risk.high{background:rgba(210,153,34,.2);color:#d29922;border:1px solid rgba(210,153,34,.3)}
#tooltip .tt-risk.medium{background:rgba(88,166,255,.15);color:#58a6ff;border:1px solid rgba(88,166,255,.2)}
#tooltip .tt-risk.low{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.2)}
#tooltip .tt-risk.owned{background:rgba(255,215,0,.2);color:#ffd700;border:1px solid rgba(255,215,0,.3)}
#tooltip .tt-score{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;
  font-weight:700;margin-left:4px;font-family:'SF Mono',Menlo,monospace}

/* Controls overlay */
#controls{position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:5;
  flex-wrap:wrap;justify-content:flex-end;max-width:600px}
#controls button{background:rgba(22,27,34,.85);backdrop-filter:blur(8px);
  border:1px solid #30363d;border-radius:6px;
  color:#e6edf3;padding:6px 12px;font-size:11px;cursor:pointer;transition:all .15s;
  font-weight:500}
#controls button:hover{background:rgba(48,54,61,.9);border-color:#58a6ff}
#controls button.active{background:rgba(88,166,255,.15);border-color:#58a6ff;color:#58a6ff}

/* Stats bar */
#stats{position:absolute;bottom:12px;left:12px;font-size:11px;color:#8b949e;z-index:5;
  background:rgba(13,17,23,.8);backdrop-filter:blur(8px);padding:6px 12px;border-radius:6px;
  border:1px solid #21262d;display:flex;gap:12px;align-items:center}
#stats .stat-item{display:flex;align-items:center;gap:4px}
#stats .stat-dot{width:6px;height:6px;border-radius:50%}

/* Focus banner */
#focus-banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(22,27,34,.92);backdrop-filter:blur(8px);
  border:1px solid #3fb950;border-radius:8px;padding:8px 16px;font-size:13px;z-index:6;
  display:none;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#focus-banner.visible{display:flex}
#focus-banner button{background:#21262d;border:1px solid #30363d;border-radius:4px;
  color:#e6edf3;padding:4px 10px;font-size:12px;cursor:pointer;transition:all .1s}
#focus-banner button:hover{border-color:#3fb950;color:#3fb950}

/* Path banner */
#path-banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(22,27,34,.92);backdrop-filter:blur(8px);
  border:1px solid #58a6ff;border-radius:8px;padding:8px 16px;font-size:13px;z-index:6;
  display:none;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#path-banner.visible{display:flex}
#path-banner button{background:#21262d;border:1px solid #30363d;border-radius:4px;
  color:#e6edf3;padding:4px 10px;font-size:12px;cursor:pointer;transition:all .1s}
#path-banner button:hover{border-color:#58a6ff;color:#58a6ff}

/* Context menu */
#context-menu{position:absolute;background:#1c2333;border:1px solid #30363d;border-radius:8px;
  padding:4px 0;font-size:12px;z-index:20;display:none;min-width:220px;
  box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 1px rgba(255,255,255,.1);
  backdrop-filter:blur(8px)}
.ctx-item{padding:7px 14px;cursor:pointer;color:#e6edf3;transition:background .1s;
  display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:rgba(88,166,255,.1)}
.ctx-item .ctx-icon{width:16px;text-align:center;color:#8b949e;font-size:11px}
.ctx-separator{height:1px;background:#30363d;margin:4px 0}
.ctx-sub{padding:5px 14px 5px 38px;cursor:pointer;color:#c9d1d9;font-size:11px;
  transition:background .1s}
.ctx-sub:hover{background:rgba(88,166,255,.1)}

/* Canvas cursor */
canvas{display:block}
canvas.grabbing{cursor:grabbing}

/* Live mode: query browser section */
#query-section{display:none}
#query-section.live{display:block}
#query-list{max-height:300px;overflow-y:auto;font-size:12px}
#query-list::-webkit-scrollbar{width:6px}
#query-list::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.query-item{padding:6px 8px;cursor:pointer;border-bottom:1px solid #21262d;display:flex;
  align-items:center;gap:6px;transition:background .1s}
.query-item:hover{background:rgba(88,166,255,.08)}
.query-id{color:#8b949e;font-size:10px;min-width:22px;font-weight:500}
.query-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.severity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.severity-dot.critical{background:#f85149;box-shadow:0 0 4px rgba(248,81,73,.4)}
.severity-dot.high{background:#d29922;box-shadow:0 0 4px rgba(210,153,34,.3)}
.severity-dot.informational{background:#3fb950}
.cat-badge{font-size:9px;padding:1px 5px;border-radius:3px;color:#fff;flex-shrink:0;
  font-weight:500;letter-spacing:.3px}
.cat-badge.red{background:rgba(248,81,73,.25);color:#f85149}
.cat-badge.blue{background:rgba(88,166,255,.2);color:#58a6ff}
.cat-badge.forensic{background:rgba(210,153,34,.2);color:#d29922}

/* Results overlay */
#results-panel{position:absolute;top:0;right:0;width:440px;height:100%;background:#161b22;
  border-left:1px solid #30363d;z-index:15;display:none;flex-direction:column;
  overflow:hidden;box-shadow:-4px 0 16px rgba(0,0,0,.3)}
#results-panel.open{display:flex}
#results-header{padding:12px 16px;border-bottom:1px solid #30363d;display:flex;
  align-items:center;justify-content:space-between;background:#1c2333}
#results-header h3{font-size:13px;font-weight:600;color:#f0f6fc;margin:0}
#results-close{background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;
  padding:4px 8px;border-radius:4px;transition:all .1s}
#results-close:hover{color:#f0f6fc;background:rgba(255,255,255,.08)}
#results-meta{padding:8px 16px;font-size:11px;color:#8b949e;border-bottom:1px solid #21262d}
#results-body{flex:1;overflow-y:auto;padding:0}
#results-body::-webkit-scrollbar{width:6px}
#results-body::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
#results-body table{width:100%;border-collapse:collapse;font-size:11px}
#results-body th{position:sticky;top:0;background:#1c2333;padding:6px 8px;text-align:left;
  color:#8b949e;font-weight:600;border-bottom:1px solid #30363d;font-size:10px;
  text-transform:uppercase;letter-spacing:.5px}
#results-body td{padding:5px 8px;border-bottom:1px solid #21262d;color:#c9d1d9;
  max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#results-body tr:hover td{background:rgba(88,166,255,.06)}

/* Live action buttons */
.live-actions{display:none;padding:8px 16px;border-top:1px solid #30363d;background:#0d1117}
.live-actions.live{display:flex;gap:6px;flex-wrap:wrap}
.live-btn{background:#21262d;border:1px solid #30363d;border-radius:4px;color:#e6edf3;
  padding:5px 10px;font-size:11px;cursor:pointer;transition:all .15s;font-weight:500}
.live-btn:hover{border-color:#58a6ff;color:#58a6ff;background:#30363d}
</style>
</head>
<body>
<div id="app">

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <div class="brand">
      <div class="brand-icon">R</div>
      <div>
        <h1>Rootstock</h1>
        <div class="meta" id="meta-info"></div>
      </div>
    </div>
    <input type="text" id="search" placeholder="Search nodes... (Cmd+F)" autocomplete="off">
  </div>
  <div id="risk-posture">
    <div class="risk-summary" id="risk-summary"></div>
  </div>
  <div id="filters">
    <div class="filter-section">
      <h3>Node Types</h3>
      <div id="node-filters"></div>
    </div>
    <div class="filter-section">
      <h3>Edges</h3>
      <div id="edge-filters"></div>
    </div>
  </div>
  <div id="query-section" class="filter-section">
    <h3>Queries</h3>
    <div id="query-list"></div>
  </div>
  <div id="custom-query-section" class="filter-section" style="display:none">
    <h3 style="cursor:pointer" onclick="document.getElementById('custom-query-body').style.display=document.getElementById('custom-query-body').style.display==='none'?'block':'none'">Custom Cypher</h3>
    <div id="custom-query-body">
      <textarea id="cypher-input" rows="4" style="width:100%;background:#0f3460;border:1px solid #2a2a4a;border-radius:4px;color:#e0e0e0;font-family:'SF Mono',Menlo,monospace;font-size:11px;padding:8px;resize:vertical" placeholder="MATCH (n) RETURN n LIMIT 25"></textarea>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button class="live-btn" onclick="runCustomCypher()" style="flex:1">Run</button>
        <select id="cypher-history-select" style="flex:1;background:#0f3460;border:1px solid #2a2a4a;border-radius:4px;color:#888;font-size:10px;padding:2px" onchange="if(this.value){document.getElementById('cypher-input').value=this.value}">
          <option value="">History</option>
        </select>
      </div>
    </div>
  </div>
  </div>
  <div class="live-actions" id="live-actions">
    <button class="live-btn" onclick="liveRefresh()">Refresh</button>
    <button class="live-btn" onclick="liveTierClassify()">Classify Tiers</button>
    <button class="live-btn" onclick="liveShowOwned()">Show Owned</button>
  </div>
  <div id="keyboard-hints">
    <span><span class="kbd">P</span> Path</span>
    <span><span class="kbd">A</span> Attack</span>
    <span><span class="kbd">L</span> Labels</span>
    <span><span class="kbd">R</span> Reset</span>
    <span><span class="kbd">1-9</span> Toggle</span>
  </div>
  <div id="legend-footer">
    <span class="legend-stat"><span id="node-count"></span> nodes</span>
    <span class="legend-sep">|</span>
    <span class="legend-stat"><span id="edge-count"></span> edges</span>
  </div>
</div>

<!-- Graph -->
<div id="graph-container">
  <canvas id="graph-canvas"></canvas>
  <div id="tooltip"></div>
  <div id="focus-banner"><span id="focus-text"></span><button onclick="exitFocusMode()">Show All</button></div>
  <div id="path-banner"><span id="path-text">Click a source node...</span><button onclick="exitPathMode()">Cancel</button></div>
  <div id="context-menu"></div>
  <div id="controls">
    <button onclick="resetZoom()">Reset View</button>
    <button onclick="toggleLabels()" id="btn-labels" class="active">Labels</button>
    <button onclick="toggleAttackPaths()" id="btn-attack">Attack Paths</button>
    <button onclick="togglePathMode()" id="btn-path">Path Mode</button>
    <button onclick="toggleClustering()" id="btn-cluster">Cluster</button>
    <button onclick="toggleVulnFilter()" id="btn-vuln">Vulnerable</button>
    <button onclick="exportPNG()">PNG</button>
  </div>
  <div id="stats"></div>
</div>

<!-- Results panel (live mode) -->
<div id="results-panel">
  <div id="results-header">
    <h3 id="results-title">Query Results</h3>
    <button id="results-close" onclick="closeResults()">&times;</button>
  </div>
  <div id="results-meta"></div>
  <div id="results-body"></div>
</div>

<!-- Inspector -->
<div id="inspector">
  <div id="inspector-header">
    <h2 id="inspector-title">Inspector</h2>
    <button id="inspector-close" onclick="closeInspector()">&times;</button>
  </div>
  <div id="inspector-body"></div>
</div>

</div>

<script>
// ── Data (with pre-computed x,y positions) ──────────────────────────────────
const DATA = {{VIEWER_DATA}};
const nodes = DATA.graph.nodes;
const edges = DATA.graph.edges;

// Build lookup
const nodeById = new Map(nodes.map(n => [n.id, n]));
const nodeIndex = new Map(nodes.map((n, i) => [n.id, i]));

// Resolve valid links
const links = edges.filter(e => nodeById.has(e.source) && nodeById.has(e.target));

// ── Safe DOM helpers ────────────────────────────────────────────────────────
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'textContent') e.textContent = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  if (children) children.forEach(c => { if (c) e.appendChild(c); });
  return e;
}

function propRow(key, value) {
  const row = el('div', {className: 'prop-row'});
  row.appendChild(el('span', {className: 'prop-key', textContent: String(key)}));
  let cls = 'prop-val';
  let display;
  if (typeof value === 'boolean') {
    cls += value ? ' bool-true' : ' bool-false';
    display = value ? 'true' : 'false';
  } else if (Array.isArray(value)) {
    display = value.join(', ') || '(empty)';
  } else if (value === null || value === undefined) {
    cls += ' bool-false'; display = '(null)';
  } else { display = String(value); }
  row.appendChild(el('span', {className: cls, textContent: display}));
  return row;
}

function sectionHeader(text) {
  const h = el('h4', {textContent: text});
  return el('div', {className: 'prop-section'}, [h]);
}

// ── Derived data ────────────────────────────────────────────────────────────
const degreeMap = new Map();
links.forEach(l => {
  degreeMap.set(l.source, (degreeMap.get(l.source) || 0) + 1);
  degreeMap.set(l.target, (degreeMap.get(l.target) || 0) + 1);
});

function nodeRadius(d) {
  const degree = degreeMap.get(d.id) || 0;
  return Math.min(4 + Math.sqrt(degree) * 3, 24);
}

// Node kinds with colors
const kindMeta = new Map();
nodes.forEach(n => {
  if (!kindMeta.has(n.kind)) {
    kindMeta.set(n.kind, {
      color: n.properties?._color || '#888',
      count: 0,
      label: n.kind.replace('rs_', '').replace(/([A-Z])/g, ' $1').trim()
    });
  }
  kindMeta.get(n.kind).count++;
});

// Edge kinds
const edgeKinds = new Map();
links.forEach(l => {
  if (!edgeKinds.has(l.kind)) {
    edgeKinds.set(l.kind, {
      label: l.kind.replace('rs_', '').replace(/([A-Z])/g, ' $1').trim(),
      traversable: l.properties?._traversable ?? false,
      count: 0
    });
  }
  edgeKinds.get(l.kind).count++;
});

// Adjacency lists for fast neighbor lookup
const adjOut = new Map();  // source -> [{target, link}]
const adjIn = new Map();   // target -> [{source, link}]
links.forEach(l => {
  if (!adjOut.has(l.source)) adjOut.set(l.source, []);
  adjOut.get(l.source).push({target: l.target, link: l});
  if (!adjIn.has(l.target)) adjIn.set(l.target, []);
  adjIn.get(l.target).push({source: l.source, link: l});
});

// ── Progressive disclosure: default visibility ──────────────────────────────
// Only Applications visible on first load; others can be toggled on
const DEFAULT_VISIBLE_KINDS = new Set(['Application']);

// ── State ───────────────────────────────────────────────────────────────────
let showLabels = true;
let attackPathMode = false;
const activeNodeKinds = new Set(DEFAULT_VISIBLE_KINDS);
const activeEdgeKinds = new Set(edgeKinds.keys());
let selectedNode = null;
let searchTerm = '';
let hoverNode = null;
let pinnedNode = null;  // Click to pin neighbor highlight
let focusNodeId = null;
let pathMode = false;
let pathSource = null;
let pathTarget = null;
let pathResult = null;
let clusterByType = false;
let dragNode = null;
let dirty = true;
let didDrag = false;  // Suppress click after pan/drag
let mouseDownPos = {x: 0, y: 0};

// Transform state (pan/zoom)
let transform = {x: 0, y: 0, k: 1};

// ── Visibility computation ──────────────────────────────────────────────────
let visibleNodeIds = new Set();
let visibleLinkSet = new Set();

function computeVisibility() {
  // Path result takes priority
  if (pathMode && pathResult) {
    visibleNodeIds = pathResult.nodeIds;
    visibleLinkSet = new Set();
    links.forEach((l, i) => {
      if (pathResult.linkKeys.has(linkKey(l))) visibleLinkSet.add(i);
    });
    return;
  }

  // Focus mode: node + 1-hop neighbors
  if (focusNodeId) {
    visibleNodeIds = new Set([focusNodeId]);
    visibleLinkSet = new Set();
    links.forEach((l, i) => {
      if (l.source === focusNodeId || l.target === focusNodeId) {
        visibleNodeIds.add(l.source);
        visibleNodeIds.add(l.target);
        visibleLinkSet.add(i);
      }
    });
    return;
  }

  // Normal: kind filter + search filter
  visibleNodeIds = new Set();
  nodes.forEach(n => {
    const kindOk = activeNodeKinds.has(n.kind);
    const searchOk = !searchTerm ||
      (n.label || '').toLowerCase().includes(searchTerm) ||
      (n.properties?.bundle_id || '').toLowerCase().includes(searchTerm) ||
      (n.properties?.name || '').toLowerCase().includes(searchTerm) ||
      (n.properties?.service || '').toLowerCase().includes(searchTerm);
    if (kindOk && searchOk) visibleNodeIds.add(n.id);
  });

  visibleLinkSet = new Set();
  links.forEach((l, i) => {
    if (!visibleNodeIds.has(l.source) || !visibleNodeIds.has(l.target)) return;
    if (!activeEdgeKinds.has(l.kind)) return;
    if (attackPathMode && !l.properties?._traversable) return;
    visibleLinkSet.add(i);
  });
}

function markDirty() { dirty = true; }

function linkKey(l) { return l.source + '>' + l.kind + '>' + l.target; }

// ── Metadata ────────────────────────────────────────────────────────────────
const meta = DATA.metadata || {};
document.getElementById('meta-info').textContent =
  [meta.hostname, meta.generated_at?.split('T')[0]].filter(Boolean).join(' \u2014 ');
document.getElementById('node-count').textContent = nodes.length;
document.getElementById('edge-count').textContent = links.length;

// ── Filters ─────────────────────────────────────────────────────────────────
function buildFilters() {
  const nf = document.getElementById('node-filters');
  [...kindMeta.entries()].sort((a,b) => b[1].count - a[1].count).forEach(([kind, info]) => {
    const cb = el('input', {type: 'checkbox', 'data-kind': kind});
    cb.checked = activeNodeKinds.has(kind);
    cb.addEventListener('change', e => {
      if (e.target.checked) activeNodeKinds.add(kind);
      else activeNodeKinds.delete(kind);
      computeVisibility(); markDirty();
    });
    const dot = el('span', {className: 'color-dot'});
    dot.style.background = info.color;
    nf.appendChild(el('label', {className: 'filter-item'}, [
      cb, dot,
      el('span', {textContent: info.label}),
      el('span', {className: 'filter-count', textContent: String(info.count)})
    ]));
  });

  const ef = document.getElementById('edge-filters');
  const travCount = [...edgeKinds.values()].filter(e => e.traversable).reduce((s,e) => s + e.count, 0);
  const nonTravCount = [...edgeKinds.values()].filter(e => !e.traversable).reduce((s,e) => s + e.count, 0);

  const travCb = el('input', {type: 'checkbox', id: 'filter-trav'});
  travCb.checked = true;
  travCb.addEventListener('change', e => {
    edgeKinds.forEach((info, kind) => {
      if (info.traversable) {
        if (e.target.checked) activeEdgeKinds.add(kind);
        else activeEdgeKinds.delete(kind);
      }
    });
    computeVisibility(); markDirty();
  });
  ef.appendChild(el('label', {className: 'filter-item'}, [
    travCb, el('span', {textContent: 'Traversable (attack)'}),
    el('span', {className: 'filter-count', textContent: String(travCount)})
  ]));

  const nonTravCb = el('input', {type: 'checkbox', id: 'filter-nontrav'});
  nonTravCb.checked = true;
  nonTravCb.addEventListener('change', e => {
    edgeKinds.forEach((info, kind) => {
      if (!info.traversable) {
        if (e.target.checked) activeEdgeKinds.add(kind);
        else activeEdgeKinds.delete(kind);
      }
    });
    computeVisibility(); markDirty();
  });
  ef.appendChild(el('label', {className: 'filter-item'}, [
    nonTravCb, el('span', {textContent: 'Non-traversable (info)'}),
    el('span', {className: 'filter-count', textContent: String(nonTravCount)})
  ]));
}
buildFilters();

// ── Search ──────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  computeVisibility(); markDirty();
});

// ── Canvas setup ────────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = container.clientWidth;
  H = container.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  markDirty();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Quadtree for hit-testing ────────────────────────────────────────────────
class SimpleQuadtree {
  constructor(nodes, x0, y0, x1, y1) {
    this.nodes = nodes;
    this.x0 = x0; this.y0 = y0; this.x1 = x1; this.y1 = y1;
  }

  findNearest(px, py, maxDist) {
    let best = null;
    let bestDist = maxDist * maxDist;
    for (const n of this.nodes) {
      if (!visibleNodeIds.has(n.id)) continue;
      const dx = n.x - px;
      const dy = n.y - py;
      const r = nodeRadius(n);
      const d = dx * dx + dy * dy;
      if (d < (r + maxDist) * (r + maxDist) && d < bestDist + r * r) {
        const actualDist = Math.sqrt(d) - r;
        if (actualDist < Math.sqrt(bestDist)) {
          bestDist = actualDist * actualDist;
          best = n;
        }
      }
    }
    return best;
  }
}

let quadtree = new SimpleQuadtree(nodes, 0, 0, 2000, 2000);

// ── Transform helpers ───────────────────────────────────────────────────────
function screenToWorld(sx, sy) {
  return {
    x: (sx - transform.x) / transform.k,
    y: (sy - transform.y) / transform.k
  };
}

function worldToScreen(wx, wy) {
  return {
    x: wx * transform.k + transform.x,
    y: wy * transform.k + transform.y
  };
}

// ── Pan & Zoom (mouse/trackpad) ─────────────────────────────────────────────
let isPanning = false;
let panStart = {x: 0, y: 0};

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Zoom around mouse position
  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  const newK = Math.max(0.05, Math.min(20, transform.k * zoomFactor));
  const ratio = newK / transform.k;
  transform.x = mx - (mx - transform.x) * ratio;
  transform.y = my - (my - transform.y) * ratio;
  transform.k = newK;
  markDirty();
}, {passive: false});

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) return; // right-click handled separately
  didDrag = false;
  mouseDownPos = {x: e.clientX, y: e.clientY};
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const world = screenToWorld(mx, my);

  // Check if clicking a node
  const hit = quadtree.findNearest(world.x, world.y, 20 / transform.k);
  if (hit) {
    dragNode = hit;
    dragNode._dragOffsetX = world.x - hit.x;
    dragNode._dragOffsetY = world.y - hit.y;
    canvas.style.cursor = 'grabbing';
  } else {
    isPanning = true;
    panStart = {x: e.clientX - transform.x, y: e.clientY - transform.y};
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Detect drag (moved more than 4px from mousedown)
  if (!didDrag && (dragNode || isPanning)) {
    const dx = e.clientX - mouseDownPos.x;
    const dy = e.clientY - mouseDownPos.y;
    if (dx * dx + dy * dy > 16) didDrag = true;
  }

  if (dragNode) {
    const world = screenToWorld(mx, my);
    dragNode.x = world.x - dragNode._dragOffsetX;
    dragNode.y = world.y - dragNode._dragOffsetY;
    markDirty();
    return;
  }

  if (isPanning) {
    transform.x = e.clientX - panStart.x;
    transform.y = e.clientY - panStart.y;
    markDirty();
    return;
  }

  // Hover detection
  const world = screenToWorld(mx, my);
  const hit = quadtree.findNearest(world.x, world.y, 20 / transform.k);
  if (hit !== hoverNode) {
    hoverNode = hit;
    canvas.style.cursor = hit ? 'pointer' : 'default';
    if (hit) showTooltip(e, hit);
    else hideTooltip();
    markDirty();
  } else if (hit) {
    // Update tooltip position
    const tooltip = document.getElementById('tooltip');
    tooltip.style.left = (mx + 16) + 'px';
    tooltip.style.top = (my - 8) + 'px';
  }
});

canvas.addEventListener('mouseup', e => {
  if (dragNode) {
    // If barely moved, treat as click
    dragNode = null;
    canvas.style.cursor = 'default';
    markDirty();
    return;
  }
  if (isPanning) {
    isPanning = false;
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('click', e => {
  // Ignore click if it was actually a pan/drag
  if (didDrag) return;

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const world = screenToWorld(mx, my);
  const hit = quadtree.findNearest(world.x, world.y, 20 / transform.k);

  hideContextMenu();

  if (hit) {
    if (pathMode) { handlePathClick(hit); return; }
    // Toggle pin: click same node unpins, different node re-pins
    if (pinnedNode && pinnedNode.id === hit.id) {
      pinnedNode = null;
      selectedNode = null;
      closeInspector();
    } else {
      pinnedNode = hit;
      selectedNode = hit;
      inspectNode(hit);
    }
  } else {
    if (pathMode) return;
    pinnedNode = null;
    selectedNode = null;
    closeInspector();
  }
  markDirty();
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const world = screenToWorld(mx, my);
  const hit = quadtree.findNearest(world.x, world.y, 20 / transform.k);
  if (hit) showContextMenu(e, hit);
});

// ── Node shapes ─────────────────────────────────────────────────────────────
// Maps node kind prefixes to distinct shapes for visual identification.
// Shapes: circle (default), diamond (vulnerabilities/threats), hexagon (security),
// square (infrastructure), triangle (users/groups), roundrect (services)
const SHAPE_MAP = {
  'rs_Vulnerability': 'diamond',
  'rs_AttackTechnique': 'diamond',
  'rs_ThreatGroup': 'diamond',
  'rs_CWE': 'diamond',
  'rs_TCCPermission': 'hexagon',
  'rs_Entitlement': 'hexagon',
  'rs_AuthRight': 'hexagon',
  'rs_SandboxProfile': 'hexagon',
  'rs_User': 'triangle',
  'rs_LocalGroup': 'triangle',
  'rs_ADUser': 'triangle',
  'rs_ADGroup': 'triangle',
  'rs_Computer': 'square',
  'rs_CriticalFile': 'square',
  'rs_Firewall': 'square',
  'rs_XPCService': 'roundrect',
  'rs_LaunchItem': 'roundrect',
  'rs_RemoteAccess': 'roundrect',
  'rs_LoginSession': 'roundrect',
  'rs_SystemExt': 'roundrect',
  'rs_Recommendation': 'roundrect',
};

function drawNodeShape(ctx, x, y, r, shape) {
  switch (shape) {
    case 'diamond': {
      const s = r * 1.3;
      ctx.moveTo(x, y - s);
      ctx.lineTo(x + s, y);
      ctx.lineTo(x, y + s);
      ctx.lineTo(x - s, y);
      ctx.closePath();
      break;
    }
    case 'hexagon': {
      const s = r * 1.1;
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 6 + (Math.PI / 3) * i;
        const px = x + s * Math.cos(angle);
        const py = y + s * Math.sin(angle);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    }
    case 'square': {
      const s = r * 0.9;
      const cr = s * 0.2; // corner radius
      ctx.moveTo(x - s + cr, y - s);
      ctx.lineTo(x + s - cr, y - s);
      ctx.arcTo(x + s, y - s, x + s, y - s + cr, cr);
      ctx.lineTo(x + s, y + s - cr);
      ctx.arcTo(x + s, y + s, x + s - cr, y + s, cr);
      ctx.lineTo(x - s + cr, y + s);
      ctx.arcTo(x - s, y + s, x - s, y + s - cr, cr);
      ctx.lineTo(x - s, y - s + cr);
      ctx.arcTo(x - s, y - s, x - s + cr, y - s, cr);
      ctx.closePath();
      break;
    }
    case 'triangle': {
      const s = r * 1.2;
      ctx.moveTo(x, y - s);
      ctx.lineTo(x + s * 0.87, y + s * 0.5);
      ctx.lineTo(x - s * 0.87, y + s * 0.5);
      ctx.closePath();
      break;
    }
    case 'roundrect': {
      const w = r * 1.5, h = r * 0.9, cr = r * 0.35;
      ctx.moveTo(x - w + cr, y - h);
      ctx.lineTo(x + w - cr, y - h);
      ctx.arcTo(x + w, y - h, x + w, y - h + cr, cr);
      ctx.lineTo(x + w, y + h - cr);
      ctx.arcTo(x + w, y + h, x + w - cr, y + h, cr);
      ctx.lineTo(x - w + cr, y + h);
      ctx.arcTo(x - w, y + h, x - w, y + h - cr, cr);
      ctx.lineTo(x - w, y - h + cr);
      ctx.arcTo(x - w, y - h, x - w + cr, y - h, cr);
      ctx.closePath();
      break;
    }
    default: // circle
      ctx.arc(x, y, r, 0, Math.PI * 2);
  }
}

function getNodeShape(kind) {
  return SHAPE_MAP[kind] || 'circle';
}

// ── Drawing ─────────────────────────────────────────────────────────────────
const ARROW_SIZE = 6;

function draw() {
  if (!dirty) { requestAnimationFrame(draw); return; }
  dirty = false;

  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  // Dark background with subtle radial gradient
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  bgGrad.addColorStop(0, '#111827');
  bgGrad.addColorStop(1, '#0d1117');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Apply transform
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  // Viewport bounds in world coordinates (for culling)
  const vp = {
    x0: -transform.x / transform.k - 100,
    y0: -transform.y / transform.k - 100,
    x1: (W - transform.x) / transform.k + 100,
    y1: (H - transform.y) / transform.k + 100
  };

  // ── Draw edges ──────────────────────────────────────────────────────────
  // Pinned node takes priority over hover for neighbor highlighting
  const highlightNode = (!pathMode && !focusNodeId) ? (pinnedNode || hoverNode) : null;
  const isNeighborHighlight = !!highlightNode;
  let hoverNeighborNodes, hoverNeighborLinks;
  if (isNeighborHighlight) {
    hoverNeighborNodes = new Set([highlightNode.id]);
    hoverNeighborLinks = new Set();
    (adjOut.get(highlightNode.id) || []).forEach(e => { hoverNeighborNodes.add(e.target); hoverNeighborLinks.add(e.link); });
    (adjIn.get(highlightNode.id) || []).forEach(e => { hoverNeighborNodes.add(e.source); hoverNeighborLinks.add(e.link); });
  }

  links.forEach((l, i) => {
    const visible = visibleLinkSet.has(i);
    if (!visible && !isNeighborHighlight) return;

    const src = nodeById.get(l.source);
    const tgt = nodeById.get(l.target);
    if (!src || !tgt) return;

    // Viewport culling for edges
    const minX = Math.min(src.x, tgt.x);
    const maxX = Math.max(src.x, tgt.x);
    const minY = Math.min(src.y, tgt.y);
    const maxY = Math.max(src.y, tgt.y);
    if (maxX < vp.x0 || minX > vp.x1 || maxY < vp.y0 || minY > vp.y1) return;

    const trav = l.properties?._traversable;
    let alpha = visible ? (trav ? 0.5 : 0.2) : 0.03;
    let color = trav ? '#58a6ff' : '#30363d';
    let width = trav ? 1.5 : 0.7;
    let dashPattern = null;

    // Path highlight
    if (pathMode && pathResult && pathResult.linkKeys.has(linkKey(l))) {
      color = '#f85149'; alpha = 1; width = 3;
    }

    // Neighbor highlight
    if (isNeighborHighlight) {
      if (hoverNeighborLinks.has(l)) {
        alpha = 0.85; width = trav ? 2.5 : 1.5;
        color = trav ? '#79c0ff' : '#8b949e';
      } else {
        alpha = 0.03;
      }
    }

    // Inferred edges get dashed style
    if (!trav && visible && alpha > 0.05) {
      dashPattern = [4 / transform.k, 3 / transform.k];
    }

    ctx.beginPath();
    if (dashPattern) ctx.setLineDash(dashPattern);
    else ctx.setLineDash([]);
    ctx.moveTo(src.x, src.y);
    ctx.lineTo(tgt.x, tgt.y);
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = width / transform.k;
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow (directional indicator)
    if (transform.k > 0.3) {
      const dx = tgt.x - src.x;
      const dy = tgt.y - src.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0) {
        const tr = nodeRadius(tgt);
        const ax = tgt.x - (dx / dist) * (tr + 2);
        const ay = tgt.y - (dy / dist) * (tr + 2);
        const angle = Math.atan2(dy, dx);
        const as = ARROW_SIZE / transform.k;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - as * Math.cos(angle - 0.4), ay - as * Math.sin(angle - 0.4));
        ctx.lineTo(ax - as * Math.cos(angle + 0.4), ay - as * Math.sin(angle + 0.4));
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }
    }
  });

  ctx.globalAlpha = 1;

  // ── Draw nodes ──────────────────────────────────────────────────────────
  const labelThreshold = 0.4;  // Zoom level above which labels appear
  const showAllLabels = showLabels && transform.k >= labelThreshold;
  const showHighDegreeLabels = showLabels && transform.k >= 0.2 && transform.k < labelThreshold;

  nodes.forEach(n => {
    // Viewport culling
    if (n.x < vp.x0 || n.x > vp.x1 || n.y < vp.y0 || n.y > vp.y1) return;

    const isVisible = visibleNodeIds.has(n.id);
    if (!isVisible && !isNeighborHighlight) return;

    const r = nodeRadius(n);
    const color = n.properties?._color || kindMeta.get(n.kind)?.color || '#888';
    let alpha = isVisible ? 1 : 0.1;

    if (isNeighborHighlight) {
      alpha = hoverNeighborNodes.has(n.id) ? 1 : 0.08;
    }

    // Path highlighting
    let strokeColor = '#21262d';
    let strokeWidth = 1.5 / transform.k;
    if (pathMode && pathResult) {
      if (n.id === pathSource) { strokeColor = '#3fb950'; strokeWidth = 3 / transform.k; }
      else if (n.id === pathTarget) { strokeColor = '#f85149'; strokeWidth = 3 / transform.k; }
      else if (pathResult.nodeIds.has(n.id)) { strokeColor = '#f85149'; strokeWidth = 2 / transform.k; }
    }
    if (selectedNode && n.id === selectedNode.id) {
      strokeColor = '#f0f6fc'; strokeWidth = 2.5 / transform.k;
    }

    ctx.globalAlpha = alpha;

    // Risk-level and owned glow
    const riskLevel = n.properties?.risk_level;
    if (n.properties?.owned) {
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 14 / transform.k;
    } else if (riskLevel === 'critical') {
      ctx.shadowColor = '#f85149';
      ctx.shadowBlur = 10 / transform.k;
    } else if (riskLevel === 'high') {
      ctx.shadowColor = '#d29922';
      ctx.shadowBlur = 8 / transform.k;
    }

    // Draw node shape
    const shape = getNodeShape(n.kind);
    ctx.beginPath();
    drawNodeShape(ctx, n.x, n.y, r, shape);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = strokeWidth;
    ctx.stroke();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Risk score ring indicator (visible at moderate zoom)
    if (n.properties?.risk_score != null && transform.k > 0.25) {
      const score = n.properties.risk_score;
      if (score >= 25) {
        const ringColor = score >= 75 ? '#f85149' : score >= 50 ? '#d29922' : '#58a6ff';
        const ringAlpha = Math.min(0.8, score / 100);
        // Draw a partial arc proportional to risk score
        const arcEnd = (score / 100) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r + 4 / transform.k, -Math.PI / 2, -Math.PI / 2 + arcEnd);
        ctx.strokeStyle = ringColor;
        ctx.globalAlpha = alpha * ringAlpha;
        ctx.lineWidth = 2.5 / transform.k;
        ctx.stroke();
        ctx.globalAlpha = alpha;
      }
    }

    // Vulnerability border ring (KEV = red pulse, high-EPSS = orange)
    const vulnEdges = (adjOut.get(n.id) || []).filter(e => e.link.kind === 'rs_AffectedBy');
    if (vulnEdges.length > 0 && transform.k > 0.2) {
      let hasKev = false, hasHighEpss = false;
      vulnEdges.forEach(({target}) => {
        const vn = nodeById.get(target);
        if (vn) {
          if (vn.properties?.in_kev) hasKev = true;
          if (vn.properties?.epss_score > 0.5) hasHighEpss = true;
        }
      });
      if (hasKev || hasHighEpss) {
        const ringColor = hasKev ? '#f85149' : '#d29922';
        ctx.beginPath();
        ctx.arc(n.x, n.y, r + 3 / transform.k, 0, Math.PI * 2);
        ctx.strokeStyle = ringColor;
        ctx.lineWidth = 2 / transform.k;
        ctx.setLineDash([3 / transform.k, 2 / transform.k]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // Tier badge
    if (n.properties?.tier != null && transform.k > 0.3) {
      const tierColors = {'0': '#f85149', '1': '#d29922', '2': '#58a6ff'};
      const tierColor = tierColors[String(n.properties.tier)] || '#8b949e';
      // Small badge circle at top-right of node
      const bx = n.x + r * 0.65, by = n.y - r * 0.65;
      const br = Math.max(5, 6 / transform.k);
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fillStyle = tierColor;
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(6, 6 / transform.k)}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(n.properties.tier), bx, by + 0.5);
    }

    // Labels (semantic zoom)
    const shouldLabel = showAllLabels ||
      (showHighDegreeLabels && (degreeMap.get(n.id) || 0) > 5) ||
      (hoverNode && hoverNode.id === n.id) ||
      (selectedNode && selectedNode.id === n.id) ||
      (pathMode && pathResult && (n.id === pathSource || n.id === pathTarget));

    if (shouldLabel && n.label) {
      const fontSize = Math.max(9, Math.min(12, 10 / transform.k));
      ctx.font = `500 ${fontSize}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      // Label background pill for readability
      const label = n.label.length > 24 ? n.label.slice(0, 23) + '\u2026' : n.label;
      const lw = ctx.measureText(label).width;
      const ly = n.y + r + 4;
      ctx.fillStyle = 'rgba(13,17,23,.75)';
      ctx.beginPath();
      const pad = 3, rr = 3;
      ctx.roundRect(n.x - lw/2 - pad, ly - 1, lw + pad*2, fontSize + 3, rr);
      ctx.fill();
      ctx.fillStyle = '#c9d1d9';
      ctx.fillText(label, n.x, ly);
    }
  });

  // ── Edge labels (visible on hover or path) ────────────────────────────
  if (transform.k > 0.5) {
    ctx.globalAlpha = 0.85;
    const edgeFontSize = Math.max(8, 9 / transform.k);
    ctx.font = `500 ${edgeFontSize}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    function drawEdgeLabel(src, tgt, text, color) {
      const mx = (src.x + tgt.x) / 2;
      const my = (src.y + tgt.y) / 2;
      // Background pill
      const tw = ctx.measureText(text).width;
      ctx.fillStyle = 'rgba(13,17,23,.8)';
      ctx.beginPath();
      ctx.roundRect(mx - tw/2 - 4, my - edgeFontSize/2 - 2, tw + 8, edgeFontSize + 4, 3);
      ctx.fill();
      ctx.fillStyle = color;
      ctx.fillText(text, mx, my);
    }

    if (isNeighborHighlight) {
      hoverNeighborLinks.forEach(l => {
        const src = nodeById.get(l.source);
        const tgt = nodeById.get(l.target);
        if (src && tgt) {
          const info = edgeKinds.get(l.kind);
          drawEdgeLabel(src, tgt, info?.label || l.kind, '#c9d1d9');
        }
      });
    }
    if (pathMode && pathResult) {
      links.forEach(l => {
        if (pathResult.linkKeys.has(linkKey(l))) {
          const src = nodeById.get(l.source);
          const tgt = nodeById.get(l.target);
          if (src && tgt) {
            const info = edgeKinds.get(l.kind);
            drawEdgeLabel(src, tgt, info?.label || l.kind, '#f85149');
          }
        }
      });
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
  requestAnimationFrame(draw);
}

// Start draw loop
requestAnimationFrame(draw);

  }

      textContent: riskLevel.toUpperCase()});
    kindDiv.appendChild(badge);
  }
  // Risk score numeric display
  if (d.properties?.risk_score != null) {
    const score = d.properties.risk_score;

    scoreBadge.style.background = scoreColor + '25';
    scoreBadge.style.color = scoreColor;

    kindDiv.appendChild(scoreBadge);
  }

  // Detail section
  const degree = degreeMap.get(d.id) || 0;
  const vulnCount = (adjOut.get(d.id) || []).filter(e => e.link.kind === 'rs_AffectedBy').length;
  const detailParts = [];
  if (degree > 0) detailParts.push(degree + ' connections');
  if (vulnCount > 0) detailParts.push(vulnCount + ' CVE' + (vulnCount > 1 ? 's' : ''));
  if (d.properties?.injectable) detailParts.push('[!] Injectable');
  if (d.properties?.hardened_runtime === false) detailParts.push('[!] No hardened runtime');

    const detailDiv = el('div', {className: 'tt-detail', textContent: detailParts.join(' \u00b7 ')});
    tooltip.appendChild(detailDiv);
  }

  tooltip.classList.add('visible');
  const rect = container.getBoundingClientRect();
  // Smart positioning: avoid going off-screen
  let tx = event.clientX - rect.left + 16;
