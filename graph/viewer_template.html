<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rootstock — {{VIEWER_TITLE}}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  background:#1a1a2e;color:#e0e0e0;overflow:hidden;height:100vh}
a{color:#6ea8fe}

/* Layout */
#app{display:flex;height:100vh}
#sidebar{width:280px;min-width:280px;background:#16213e;border-right:1px solid #2a2a4a;
  display:flex;flex-direction:column;overflow:hidden}
#graph-container{flex:1;position:relative;overflow:hidden}
#inspector{width:320px;min-width:320px;background:#16213e;border-left:1px solid #2a2a4a;
  overflow-y:auto;display:none}
#inspector.open{display:block}

/* Sidebar */
#sidebar-header{padding:16px;border-bottom:1px solid #2a2a4a}
#sidebar-header h1{font-size:16px;font-weight:600;color:#fff;margin-bottom:4px}
#sidebar-header .meta{font-size:11px;color:#888}
#search{width:100%;padding:8px 12px;background:#0f3460;border:1px solid #2a2a4a;
  border-radius:6px;color:#e0e0e0;font-size:13px;margin-top:10px;outline:none}
#search:focus{border-color:#6ea8fe}
#search::placeholder{color:#666}
#filters{flex:1;overflow-y:auto;padding:12px 16px}
.filter-section{margin-bottom:16px}
.filter-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.8px;
  color:#888;margin-bottom:8px}
.filter-item{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;
  font-size:12px}
.filter-item input[type=checkbox]{accent-color:#6ea8fe;cursor:pointer}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.filter-count{margin-left:auto;color:#666;font-size:11px}

/* Legend footer */
#legend-footer{padding:12px 16px;border-top:1px solid #2a2a4a;font-size:11px;color:#666}

/* Inspector */
#inspector-header{padding:16px;border-bottom:1px solid #2a2a4a;display:flex;
  align-items:center;justify-content:space-between}
#inspector-header h2{font-size:14px;font-weight:600;color:#fff}
#inspector-close{background:none;border:none;color:#888;font-size:18px;cursor:pointer;
  padding:4px 8px}
#inspector-close:hover{color:#fff}
#inspector-body{padding:16px}
.prop-section{margin-bottom:16px}
.prop-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.8px;
  color:#888;margin-bottom:8px}
.prop-row{display:flex;justify-content:space-between;padding:4px 0;
  border-bottom:1px solid #1a1a2e;font-size:12px}
.prop-key{color:#888;flex-shrink:0;margin-right:12px}
.prop-val{color:#e0e0e0;text-align:right;word-break:break-all;max-width:180px}
.prop-val.bool-true{color:#4ade80}
.prop-val.bool-false{color:#f87171}
.kind-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;
  font-weight:600;margin-bottom:8px}

/* Tooltip */
#tooltip{position:absolute;background:#0f3460;border:1px solid #2a2a4a;border-radius:6px;
  padding:8px 12px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .1s;
  max-width:300px;z-index:10;white-space:pre-line}
#tooltip.visible{opacity:1}

/* Controls overlay */
#controls{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:5;
  flex-wrap:wrap;justify-content:flex-end;max-width:560px}
#controls button{background:#16213e;border:1px solid #2a2a4a;border-radius:6px;
  color:#e0e0e0;padding:6px 12px;font-size:12px;cursor:pointer;transition:all .15s}
#controls button:hover{background:#0f3460;border-color:#6ea8fe}
#controls button.active{background:#0f3460;border-color:#6ea8fe;color:#6ea8fe}

/* Stats bar */
#stats{position:absolute;bottom:12px;left:12px;font-size:11px;color:#666;z-index:5}

/* Focus banner */
#focus-banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:#16213e;
  border:1px solid #4ade80;border-radius:8px;padding:8px 16px;font-size:13px;z-index:6;
  display:none;align-items:center;gap:10px}
#focus-banner.visible{display:flex}
#focus-banner button{background:#0f3460;border:1px solid #2a2a4a;border-radius:4px;
  color:#e0e0e0;padding:4px 10px;font-size:12px;cursor:pointer}

/* Path banner */
#path-banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:#16213e;
  border:1px solid #6ea8fe;border-radius:8px;padding:8px 16px;font-size:13px;z-index:6;
  display:none;align-items:center;gap:10px}
#path-banner.visible{display:flex}
#path-banner button{background:#0f3460;border:1px solid #2a2a4a;border-radius:4px;
  color:#e0e0e0;padding:4px 10px;font-size:12px;cursor:pointer}

/* Context menu */
#context-menu{position:absolute;background:#16213e;border:1px solid #2a2a4a;border-radius:6px;
  padding:4px 0;font-size:12px;z-index:20;display:none;min-width:200px;
  box-shadow:0 4px 12px rgba(0,0,0,.4)}
.ctx-item{padding:6px 14px;cursor:pointer;color:#e0e0e0}
.ctx-item:hover{background:#0f3460}
.ctx-separator{height:1px;background:#2a2a4a;margin:4px 0}
.ctx-sub{padding:4px 14px 4px 28px;cursor:pointer;color:#ccc;font-size:11px}
.ctx-sub:hover{background:#0f3460}

/* Canvas cursor */
canvas{display:block}
canvas.grabbing{cursor:grabbing}

/* Live mode: query browser section */
#query-section{display:none}
#query-section.live{display:block}
#query-list{max-height:300px;overflow-y:auto;font-size:12px}
.query-item{padding:6px 8px;cursor:pointer;border-bottom:1px solid #1a1a2e;display:flex;
  align-items:center;gap:6px}
.query-item:hover{background:#0f3460}
.query-id{color:#888;font-size:10px;min-width:22px}
.query-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.severity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.severity-dot.critical{background:#ff4444}
.severity-dot.high{background:#ffaa00}
.severity-dot.informational{background:#44cc44}
.cat-badge{font-size:9px;padding:1px 4px;border-radius:3px;color:#fff;flex-shrink:0}
.cat-badge.red{background:#8b2252}
.cat-badge.blue{background:#2255aa}
.cat-badge.forensic{background:#886622}

/* Results overlay */
#results-panel{position:absolute;top:0;right:0;width:420px;height:100%;background:#16213e;
  border-left:1px solid #2a2a4a;z-index:15;display:none;flex-direction:column;
  overflow:hidden}
#results-panel.open{display:flex}
#results-header{padding:12px 16px;border-bottom:1px solid #2a2a4a;display:flex;
  align-items:center;justify-content:space-between}
#results-header h3{font-size:13px;font-weight:600;color:#fff;margin:0}
#results-close{background:none;border:none;color:#888;font-size:18px;cursor:pointer;
  padding:4px 8px}
#results-close:hover{color:#fff}
#results-meta{padding:8px 16px;font-size:11px;color:#888;border-bottom:1px solid #1a1a2e}
#results-body{flex:1;overflow-y:auto;padding:0}
#results-body table{width:100%;border-collapse:collapse;font-size:11px}
#results-body th{position:sticky;top:0;background:#0f3460;padding:6px 8px;text-align:left;
  color:#aaa;font-weight:500;border-bottom:1px solid #2a2a4a}
#results-body td{padding:5px 8px;border-bottom:1px solid #1a1a2e;color:#ccc;
  max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#results-body tr:hover td{background:#0f3460}

/* Live action buttons */
.live-actions{display:none;padding:8px 16px;border-top:1px solid #2a2a4a}
.live-actions.live{display:flex;gap:6px;flex-wrap:wrap}
.live-btn{background:#0f3460;border:1px solid #2a2a4a;border-radius:4px;color:#e0e0e0;
  padding:4px 10px;font-size:11px;cursor:pointer}
.live-btn:hover{border-color:#6ea8fe;color:#6ea8fe}
</style>
</head>
<body>
<div id="app">

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>Rootstock</h1>
    <div class="meta" id="meta-info"></div>
    <input type="text" id="search" placeholder="Search nodes..." autocomplete="off">
  </div>
  <div id="filters">
    <div class="filter-section">
      <h3>Node Types</h3>
      <div id="node-filters"></div>
    </div>
    <div class="filter-section">
      <h3>Edges</h3>
      <div id="edge-filters"></div>
    </div>
  </div>
  <div id="query-section" class="filter-section">
    <h3>Queries</h3>
    <div id="query-list"></div>
  </div>
  </div>
  <div class="live-actions" id="live-actions">
    <button class="live-btn" onclick="liveRefresh()">Refresh</button>
    <button class="live-btn" onclick="liveTierClassify()">Classify Tiers</button>
    <button class="live-btn" onclick="liveShowOwned()">Show Owned</button>
  </div>
  <div id="legend-footer">
    <span id="node-count"></span> nodes &middot; <span id="edge-count"></span> edges
  </div>
</div>

<!-- Graph -->
<div id="graph-container">
  <canvas id="graph-canvas"></canvas>
  <div id="tooltip"></div>
  <div id="focus-banner"><span id="focus-text"></span><button onclick="exitFocusMode()">Show All</button></div>
  <div id="path-banner"><span id="path-text">Click a source node...</span><button onclick="exitPathMode()">Cancel</button></div>
  <div id="context-menu"></div>
  <div id="controls">
    <button onclick="resetZoom()">Reset View</button>
    <button onclick="toggleLabels()" id="btn-labels" class="active">Labels</button>
    <button onclick="toggleAttackPaths()" id="btn-attack">Attack Paths</button>
    <button onclick="togglePathMode()" id="btn-path">Path Mode</button>
    <button onclick="toggleClustering()" id="btn-cluster">Cluster</button>
    <button onclick="toggleVulnFilter()" id="btn-vuln">Vulnerable</button>
    <button onclick="exportPNG()">PNG</button>
  </div>
  <div id="stats"></div>
</div>

<!-- Results panel (live mode) -->
<div id="results-panel">
  <div id="results-header">
    <h3 id="results-title">Query Results</h3>
    <button id="results-close" onclick="closeResults()">&times;</button>
  </div>
  <div id="results-meta"></div>
  <div id="results-body"></div>
</div>

<!-- Inspector -->
<div id="inspector">
  <div id="inspector-header">
    <h2 id="inspector-title">Inspector</h2>
    <button id="inspector-close" onclick="closeInspector()">&times;</button>
  </div>
  <div id="inspector-body"></div>
</div>

</div>

<script>
// ── Data (with pre-computed x,y positions) ──────────────────────────────────
const DATA = {{VIEWER_DATA}};
const nodes = DATA.graph.nodes;
const edges = DATA.graph.edges;

// Build lookup
const nodeById = new Map(nodes.map(n => [n.id, n]));
const nodeIndex = new Map(nodes.map((n, i) => [n.id, i]));

// Resolve valid links
const links = edges.filter(e => nodeById.has(e.source) && nodeById.has(e.target));

// ── Safe DOM helpers ────────────────────────────────────────────────────────
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'textContent') e.textContent = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  if (children) children.forEach(c => { if (c) e.appendChild(c); });
  return e;
}

function propRow(key, value) {
  const row = el('div', {className: 'prop-row'});
  row.appendChild(el('span', {className: 'prop-key', textContent: String(key)}));
  let cls = 'prop-val';
  let display;
  if (typeof value === 'boolean') {
    cls += value ? ' bool-true' : ' bool-false';
    display = value ? 'true' : 'false';
  } else if (Array.isArray(value)) {
    display = value.join(', ') || '(empty)';
  } else if (value === null || value === undefined) {
    cls += ' bool-false'; display = '(null)';
  } else { display = String(value); }
  row.appendChild(el('span', {className: cls, textContent: display}));
  return row;
}

function sectionHeader(text) {
  const h = el('h4', {textContent: text});
  return el('div', {className: 'prop-section'}, [h]);
}

// ── Derived data ────────────────────────────────────────────────────────────
const degreeMap = new Map();
links.forEach(l => {
  degreeMap.set(l.source, (degreeMap.get(l.source) || 0) + 1);
  degreeMap.set(l.target, (degreeMap.get(l.target) || 0) + 1);
});

function nodeRadius(d) {
  const degree = degreeMap.get(d.id) || 0;
  return Math.min(4 + Math.sqrt(degree) * 3, 24);
}

// Node kinds with colors
const kindMeta = new Map();
nodes.forEach(n => {
  if (!kindMeta.has(n.kind)) {
    kindMeta.set(n.kind, {
      color: n.properties?._color || '#888',
      count: 0,
      label: n.kind.replace('rs_', '').replace(/([A-Z])/g, ' $1').trim()
    });
  }
  kindMeta.get(n.kind).count++;
});

// Edge kinds
const edgeKinds = new Map();
links.forEach(l => {
  if (!edgeKinds.has(l.kind)) {
    edgeKinds.set(l.kind, {
      label: l.kind.replace('rs_', '').replace(/([A-Z])/g, ' $1').trim(),
      traversable: l.properties?._traversable ?? false,
      count: 0
    });
  }
  edgeKinds.get(l.kind).count++;
});

// Adjacency lists for fast neighbor lookup
const adjOut = new Map();  // source -> [{target, link}]
const adjIn = new Map();   // target -> [{source, link}]
links.forEach(l => {
  if (!adjOut.has(l.source)) adjOut.set(l.source, []);
  adjOut.get(l.source).push({target: l.target, link: l});
  if (!adjIn.has(l.target)) adjIn.set(l.target, []);
  adjIn.get(l.target).push({source: l.source, link: l});
});

// ── Progressive disclosure: default visibility ──────────────────────────────
// Only Applications visible on first load; others can be toggled on
const DEFAULT_VISIBLE_KINDS = new Set(['Application']);

// ── State ───────────────────────────────────────────────────────────────────
let showLabels = true;
let attackPathMode = false;
const activeNodeKinds = new Set(DEFAULT_VISIBLE_KINDS);
const activeEdgeKinds = new Set(edgeKinds.keys());
let selectedNode = null;
let searchTerm = '';
let hoverNode = null;
let pinnedNode = null;  // Click to pin neighbor highlight
let focusNodeId = null;
let pathMode = false;
let pathSource = null;
let pathTarget = null;
let pathResult = null;
let clusterByType = false;
let dragNode = null;
let dirty = true;
let didDrag = false;  // Suppress click after pan/drag
let mouseDownPos = {x: 0, y: 0};

// Transform state (pan/zoom)
let transform = {x: 0, y: 0, k: 1};

// ── Visibility computation ──────────────────────────────────────────────────
let visibleNodeIds = new Set();
let visibleLinkSet = new Set();

function computeVisibility() {
  // Path result takes priority
  if (pathMode && pathResult) {
    visibleNodeIds = pathResult.nodeIds;
    visibleLinkSet = new Set();
    links.forEach((l, i) => {
      if (pathResult.linkKeys.has(linkKey(l))) visibleLinkSet.add(i);
    });
    return;
  }

  // Focus mode: node + 1-hop neighbors
  if (focusNodeId) {
    visibleNodeIds = new Set([focusNodeId]);
    visibleLinkSet = new Set();
    links.forEach((l, i) => {
      if (l.source === focusNodeId || l.target === focusNodeId) {
        visibleNodeIds.add(l.source);
        visibleNodeIds.add(l.target);
        visibleLinkSet.add(i);
      }
    });
    return;
  }

  // Normal: kind filter + search filter
  visibleNodeIds = new Set();
  nodes.forEach(n => {
    const kindOk = activeNodeKinds.has(n.kind);
    const searchOk = !searchTerm ||
      (n.label || '').toLowerCase().includes(searchTerm) ||
      (n.properties?.bundle_id || '').toLowerCase().includes(searchTerm) ||
      (n.properties?.name || '').toLowerCase().includes(searchTerm) ||
      (n.properties?.service || '').toLowerCase().includes(searchTerm);
    if (kindOk && searchOk) visibleNodeIds.add(n.id);
  });

  visibleLinkSet = new Set();
  links.forEach((l, i) => {
    if (!visibleNodeIds.has(l.source) || !visibleNodeIds.has(l.target)) return;
    if (!activeEdgeKinds.has(l.kind)) return;
    if (attackPathMode && !l.properties?._traversable) return;
    visibleLinkSet.add(i);
  });
}

function markDirty() { dirty = true; }

function linkKey(l) { return l.source + '>' + l.kind + '>' + l.target; }

// ── Metadata ────────────────────────────────────────────────────────────────
const meta = DATA.metadata || {};
document.getElementById('meta-info').textContent =
  [meta.hostname, meta.generated_at?.split('T')[0]].filter(Boolean).join(' \u2014 ');
document.getElementById('node-count').textContent = nodes.length;
document.getElementById('edge-count').textContent = links.length;

// ── Filters ─────────────────────────────────────────────────────────────────
function buildFilters() {
  const nf = document.getElementById('node-filters');
  [...kindMeta.entries()].sort((a,b) => b[1].count - a[1].count).forEach(([kind, info]) => {
    const cb = el('input', {type: 'checkbox', 'data-kind': kind});
    cb.checked = activeNodeKinds.has(kind);
    cb.addEventListener('change', e => {
      if (e.target.checked) activeNodeKinds.add(kind);
      else activeNodeKinds.delete(kind);
      computeVisibility(); markDirty();
    });
    const dot = el('span', {className: 'color-dot'});
    dot.style.background = info.color;
    nf.appendChild(el('label', {className: 'filter-item'}, [
      cb, dot,
      el('span', {textContent: info.label}),
      el('span', {className: 'filter-count', textContent: String(info.count)})
    ]));
  });

  const ef = document.getElementById('edge-filters');
  const travCount = [...edgeKinds.values()].filter(e => e.traversable).reduce((s,e) => s + e.count, 0);
  const nonTravCount = [...edgeKinds.values()].filter(e => !e.traversable).reduce((s,e) => s + e.count, 0);

  const travCb = el('input', {type: 'checkbox', id: 'filter-trav'});
  travCb.checked = true;
  travCb.addEventListener('change', e => {
    edgeKinds.forEach((info, kind) => {
      if (info.traversable) {
        if (e.target.checked) activeEdgeKinds.add(kind);
        else activeEdgeKinds.delete(kind);
      }
    });
    computeVisibility(); markDirty();
  });
  ef.appendChild(el('label', {className: 'filter-item'}, [
    travCb, el('span', {textContent: 'Traversable (attack)'}),
    el('span', {className: 'filter-count', textContent: String(travCount)})
  ]));

  const nonTravCb = el('input', {type: 'checkbox', id: 'filter-nontrav'});
  nonTravCb.checked = true;
  nonTravCb.addEventListener('change', e => {
    edgeKinds.forEach((info, kind) => {
      if (!info.traversable) {
        if (e.target.checked) activeEdgeKinds.add(kind);
        else activeEdgeKinds.delete(kind);
      }
    });
    computeVisibility(); markDirty();
  });
  ef.appendChild(el('label', {className: 'filter-item'}, [
    nonTravCb, el('span', {textContent: 'Non-traversable (info)'}),
    el('span', {className: 'filter-count', textContent: String(nonTravCount)})
  ]));
}
buildFilters();

// ── Search ──────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  computeVisibility(); markDirty();
});

// ── Canvas setup ────────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = container.clientWidth;
  H = container.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  markDirty();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Quadtree for hit-testing ────────────────────────────────────────────────
class SimpleQuadtree {
  constructor(nodes, x0, y0, x1, y1) {
    this.nodes = nodes;
    this.x0 = x0; this.y0 = y0; this.x1 = x1; this.y1 = y1;
  }

  findNearest(px, py, maxDist) {
    let best = null;
    let bestDist = maxDist * maxDist;
    for (const n of this.nodes) {
      if (!visibleNodeIds.has(n.id)) continue;
      const dx = n.x - px;
      const dy = n.y - py;
      const r = nodeRadius(n);
      const d = dx * dx + dy * dy;
      if (d < (r + maxDist) * (r + maxDist) && d < bestDist + r * r) {
        const actualDist = Math.sqrt(d) - r;
        if (actualDist < Math.sqrt(bestDist)) {
          bestDist = actualDist * actualDist;
          best = n;
        }
      }
    }
    return best;
  }
}

let quadtree = new SimpleQuadtree(nodes, 0, 0, 2000, 2000);

// ── Transform helpers ───────────────────────────────────────────────────────
function screenToWorld(sx, sy) {
  return {
    x: (sx - transform.x) / transform.k,
    y: (sy - transform.y) / transform.k
  };
}

function worldToScreen(wx, wy) {
  return {
    x: wx * transform.k + transform.x,
    y: wy * transform.k + transform.y
  };
}

// ── Pan & Zoom (mouse/trackpad) ─────────────────────────────────────────────
let isPanning = false;
let panStart = {x: 0, y: 0};

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Zoom around mouse position
  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  const newK = Math.max(0.05, Math.min(20, transform.k * zoomFactor));
  const ratio = newK / transform.k;
  transform.x = mx - (mx - transform.x) * ratio;
  transform.y = my - (my - transform.y) * ratio;
  transform.k = newK;
  markDirty();
}, {passive: false});

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) return; // right-click handled separately
  didDrag = false;
  mouseDownPos = {x: e.clientX, y: e.clientY};
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const world = screenToWorld(mx, my);

  // Check if clicking a node
  const hit = quadtree.findNearest(world.x, world.y, 20 / transform.k);
  if (hit) {
    dragNode = hit;
    dragNode._dragOffsetX = world.x - hit.x;
    dragNode._dragOffsetY = world.y - hit.y;
    canvas.style.cursor = 'grabbing';
  } else {
    isPanning = true;
    panStart = {x: e.clientX - transform.x, y: e.clientY - transform.y};
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Detect drag (moved more than 4px from mousedown)
  if (!didDrag && (dragNode || isPanning)) {
    const dx = e.clientX - mouseDownPos.x;
    const dy = e.clientY - mouseDownPos.y;
    if (dx * dx + dy * dy > 16) didDrag = true;
  }

  if (dragNode) {
    const world = screenToWorld(mx, my);
    dragNode.x = world.x - dragNode._dragOffsetX;
    dragNode.y = world.y - dragNode._dragOffsetY;
    markDirty();
    return;
  }

  if (isPanning) {
    transform.x = e.clientX - panStart.x;
    transform.y = e.clientY - panStart.y;
    markDirty();
    return;
  }

  // Hover detection
  const world = screenToWorld(mx, my);
  const hit = quadtree.findNearest(world.x, world.y, 20 / transform.k);
  if (hit !== hoverNode) {
    hoverNode = hit;
    canvas.style.cursor = hit ? 'pointer' : 'default';
    if (hit) showTooltip(e, hit);
    else hideTooltip();
    markDirty();
  } else if (hit) {
    // Update tooltip position
    const tooltip = document.getElementById('tooltip');
    tooltip.style.left = (mx + 16) + 'px';
    tooltip.style.top = (my - 8) + 'px';
  }
});

canvas.addEventListener('mouseup', e => {
  if (dragNode) {
    // If barely moved, treat as click
    dragNode = null;
    canvas.style.cursor = 'default';
    markDirty();
    return;
  }
  if (isPanning) {
    isPanning = false;
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('click', e => {
  // Ignore click if it was actually a pan/drag
  if (didDrag) return;

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const world = screenToWorld(mx, my);
  const hit = quadtree.findNearest(world.x, world.y, 20 / transform.k);

  hideContextMenu();

  if (hit) {
    if (pathMode) { handlePathClick(hit); return; }
    // Toggle pin: click same node unpins, different node re-pins
    if (pinnedNode && pinnedNode.id === hit.id) {
      pinnedNode = null;
      selectedNode = null;
      closeInspector();
    } else {
      pinnedNode = hit;
      selectedNode = hit;
      inspectNode(hit);
    }
  } else {
    if (pathMode) return;
    pinnedNode = null;
    selectedNode = null;
    closeInspector();
  }
  markDirty();
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const world = screenToWorld(mx, my);
  const hit = quadtree.findNearest(world.x, world.y, 20 / transform.k);
  if (hit) showContextMenu(e, hit);
});

// ── Drawing ─────────────────────────────────────────────────────────────────
const ARROW_SIZE = 6;

function draw() {
  if (!dirty) { requestAnimationFrame(draw); return; }
  dirty = false;

  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Apply transform
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  // Viewport bounds in world coordinates (for culling)
  const vp = {
    x0: -transform.x / transform.k - 100,
    y0: -transform.y / transform.k - 100,
    x1: (W - transform.x) / transform.k + 100,
    y1: (H - transform.y) / transform.k + 100
  };

  // ── Draw edges ──────────────────────────────────────────────────────────
  // Pinned node takes priority over hover for neighbor highlighting
  const highlightNode = (!pathMode && !focusNodeId) ? (pinnedNode || hoverNode) : null;
  const isNeighborHighlight = !!highlightNode;
  let hoverNeighborNodes, hoverNeighborLinks;
  if (isNeighborHighlight) {
    hoverNeighborNodes = new Set([highlightNode.id]);
    hoverNeighborLinks = new Set();
    (adjOut.get(highlightNode.id) || []).forEach(e => { hoverNeighborNodes.add(e.target); hoverNeighborLinks.add(e.link); });
    (adjIn.get(highlightNode.id) || []).forEach(e => { hoverNeighborNodes.add(e.source); hoverNeighborLinks.add(e.link); });
  }

  links.forEach((l, i) => {
    const visible = visibleLinkSet.has(i);
    if (!visible && !isNeighborHighlight) return;

    const src = nodeById.get(l.source);
    const tgt = nodeById.get(l.target);
    if (!src || !tgt) return;

    // Viewport culling for edges
    const minX = Math.min(src.x, tgt.x);
    const maxX = Math.max(src.x, tgt.x);
    const minY = Math.min(src.y, tgt.y);
    const maxY = Math.max(src.y, tgt.y);
    if (maxX < vp.x0 || minX > vp.x1 || maxY < vp.y0 || minY > vp.y1) return;

    const trav = l.properties?._traversable;
    let alpha = visible ? (trav ? 0.6 : 0.3) : 0.04;
    let color = trav ? '#6ea8fe' : '#555';
    let width = trav ? 1.5 : 0.8;

    // Path highlight
    if (pathMode && pathResult && pathResult.linkKeys.has(linkKey(l))) {
      color = '#ff6b6b'; alpha = 1; width = 3;
    }

    // Neighbor highlight
    if (isNeighborHighlight) {
      if (hoverNeighborLinks.has(l)) {
        alpha = 0.8; width = trav ? 2 : 1.2;
      } else {
        alpha = 0.04;
      }
    }

    ctx.beginPath();
    ctx.moveTo(src.x, src.y);
    ctx.lineTo(tgt.x, tgt.y);
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = width / transform.k;
    ctx.stroke();

    // Arrow
    if (transform.k > 0.3) {
      const dx = tgt.x - src.x;
      const dy = tgt.y - src.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0) {
        const tr = nodeRadius(tgt);
        const ax = tgt.x - (dx / dist) * (tr + 2);
        const ay = tgt.y - (dy / dist) * (tr + 2);
        const angle = Math.atan2(dy, dx);
        const as = ARROW_SIZE / transform.k;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - as * Math.cos(angle - 0.4), ay - as * Math.sin(angle - 0.4));
        ctx.lineTo(ax - as * Math.cos(angle + 0.4), ay - as * Math.sin(angle + 0.4));
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }
    }
  });

  ctx.globalAlpha = 1;

  // ── Draw nodes ──────────────────────────────────────────────────────────
  const labelThreshold = 0.4;  // Zoom level above which labels appear
  const showAllLabels = showLabels && transform.k >= labelThreshold;
  const showHighDegreeLabels = showLabels && transform.k >= 0.2 && transform.k < labelThreshold;

  nodes.forEach(n => {
    // Viewport culling
    if (n.x < vp.x0 || n.x > vp.x1 || n.y < vp.y0 || n.y > vp.y1) return;

    const isVisible = visibleNodeIds.has(n.id);
    if (!isVisible && !isNeighborHighlight) return;

    const r = nodeRadius(n);
    const color = n.properties?._color || kindMeta.get(n.kind)?.color || '#888';
    let alpha = isVisible ? 1 : 0.1;

    if (isNeighborHighlight) {
      alpha = hoverNeighborNodes.has(n.id) ? 1 : 0.1;
    }

    // Path highlighting
    let strokeColor = '#2a2a4a';
    let strokeWidth = 1.5 / transform.k;
    if (pathMode && pathResult) {
      if (n.id === pathSource) { strokeColor = '#4ade80'; strokeWidth = 3 / transform.k; }
      else if (n.id === pathTarget) { strokeColor = '#ff6b6b'; strokeWidth = 3 / transform.k; }
      else if (pathResult.nodeIds.has(n.id)) { strokeColor = '#ff6b6b'; strokeWidth = 2 / transform.k; }
    }
    if (selectedNode && n.id === selectedNode.id) {
      strokeColor = '#fff'; strokeWidth = 2.5 / transform.k;
    }

    ctx.globalAlpha = alpha;

    // Owned glow
    if (n.properties?.owned) {
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 8 / transform.k;
    }

    // Draw circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = strokeWidth;
    ctx.stroke();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Vulnerability border ring (KEV = red, high-EPSS = orange)
    const vulnEdges = (adjOut.get(n.id) || []).filter(e => e.link.kind === 'rs_AffectedBy');
    if (vulnEdges.length > 0 && transform.k > 0.2) {
      let hasKev = false, hasHighEpss = false;
      vulnEdges.forEach(({target}) => {
        const vn = nodeById.get(target);
        if (vn) {
          if (vn.properties?.in_kev) hasKev = true;
          if (vn.properties?.epss_score > 0.5) hasHighEpss = true;
        }
      });
      if (hasKev || hasHighEpss) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, r + 3 / transform.k, 0, Math.PI * 2);
        ctx.strokeStyle = hasKev ? '#FF4444' : '#FF8800';
        ctx.lineWidth = 2 / transform.k;
        ctx.stroke();
      }
    }

    // Tier badge
    if (n.properties?.tier != null && transform.k > 0.3) {
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(8, 8 / transform.k)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('T' + n.properties.tier, n.x, n.y + 1);
    }

    // Labels (semantic zoom)
    const shouldLabel = showAllLabels ||
      (showHighDegreeLabels && (degreeMap.get(n.id) || 0) > 5) ||
      (hoverNode && hoverNode.id === n.id) ||
      (selectedNode && selectedNode.id === n.id) ||
      (pathMode && pathResult && (n.id === pathSource || n.id === pathTarget));

    if (shouldLabel && n.label) {
      const fontSize = Math.max(9, Math.min(12, 10 / transform.k));
      ctx.font = `${fontSize}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#ccc';
      const label = n.label.length > 22 ? n.label.slice(0, 21) + '\u2026' : n.label;
      ctx.fillText(label, n.x, n.y + r + 4);
    }
  });

  // ── Edge labels (visible on hover or path) ────────────────────────────
  if (transform.k > 0.5) {
    ctx.globalAlpha = 0.8;
    ctx.font = `${Math.max(8, 9 / transform.k)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#aaa';

    if (isNeighborHighlight) {
      hoverNeighborLinks.forEach(l => {
        const src = nodeById.get(l.source);
        const tgt = nodeById.get(l.target);
        if (src && tgt) {
          const info = edgeKinds.get(l.kind);
          ctx.fillText(info?.label || l.kind, (src.x + tgt.x) / 2, (src.y + tgt.y) / 2);
        }
      });
    }
    if (pathMode && pathResult) {
      links.forEach(l => {
        if (pathResult.linkKeys.has(linkKey(l))) {
          const src = nodeById.get(l.source);
          const tgt = nodeById.get(l.target);
          if (src && tgt) {
            const info = edgeKinds.get(l.kind);
            ctx.fillStyle = '#ff6b6b';
            ctx.fillText(info?.label || l.kind, (src.x + tgt.x) / 2, (src.y + tgt.y) / 2);
            ctx.fillStyle = '#aaa';
          }
        }
      });
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
  requestAnimationFrame(draw);
}

// Start draw loop
requestAnimationFrame(draw);

// ── Tooltip ─────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(event, d) {
  const m = kindMeta.get(d.kind) || {};
  tooltip.textContent = '';
  tooltip.appendChild(el('strong', {textContent: d.label || '?'}));
  tooltip.appendChild(document.createElement('br'));
  const kindSpan = el('span', {textContent: m.label || d.kind});
  kindSpan.style.color = m.color || '#888';
  tooltip.appendChild(kindSpan);
  if (d.properties?.tier != null) {
    tooltip.appendChild(document.createElement('br'));
    tooltip.appendChild(el('span', {textContent: 'Tier ' + d.properties.tier}));
  }
  const degree = degreeMap.get(d.id) || 0;
  if (degree > 0) {
    tooltip.appendChild(document.createElement('br'));
    tooltip.appendChild(el('span', {textContent: degree + ' connections'}));
  }
  tooltip.classList.add('visible');

  tooltip.style.left = (event.clientX - rect.left + 16) + 'px';
  tooltip.style.top = (event.clientY - rect.top - 8) + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }

// ── BFS shortest path ───────────────────────────────────────────────────────
function bfsShortestPath(sourceId, targetId) {
  const visited = new Set([sourceId]);
  const parent = new Map();
  const queue = [sourceId];
  let found = false;

  while (queue.length > 0) {
    const current = queue.shift();
    if (current === targetId) { found = true; break; }
    const neighbors = adjOut.get(current) || [];
    for (const {target, link} of neighbors) {
      if (!activeEdgeKinds.has(link.kind)) continue;
      if (!link.properties?._traversable) continue;
      if (!visited.has(target)) {
        visited.add(target);
        parent.set(target, {from: current, link});
        queue.push(target);
      }
    }
  }

  if (!found) return null;

  const nodeIds = new Set();
  const linkKeys = new Set();
  const hops = [];
  let cur = targetId;
  while (parent.has(cur)) {
    const {from, link} = parent.get(cur);
    nodeIds.add(cur);
    linkKeys.add(linkKey(link));
    hops.unshift({from, to: cur, edge: link});
    cur = from;
  }
  nodeIds.add(sourceId);
  return {nodeIds, linkKeys, hops};
}

// ── Path mode ───────────────────────────────────────────────────────────────
function togglePathMode() {
  if (pathMode) { exitPathMode(); return; }
  exitFocusMode();
  pathMode = true; pathSource = null; pathTarget = null; pathResult = null;
  document.getElementById('btn-path').classList.add('active');
  document.getElementById('path-text').textContent = 'Click a source node...';
  document.getElementById('path-banner').classList.add('visible');
  computeVisibility(); markDirty();
}

function handlePathClick(d) {
  if (pathSource && !pathTarget) {
    if (d.id === pathSource) return;
    pathTarget = d.id;
    runPathBFS();
  } else if (pathTarget && !pathSource) {
    if (d.id === pathTarget) return;
    pathSource = d.id;
    runPathBFS();
  } else {
    pathSource = d.id; pathTarget = null; pathResult = null;
    document.getElementById('path-text').textContent =
      'Source: ' + (d.label || d.id) + ' \u2014 click a target node...';
    computeVisibility(); markDirty();
  }
}

function runPathBFS() {
  pathResult = bfsShortestPath(pathSource, pathTarget);
  if (pathResult) {
    const srcLabel = nodeById.get(pathSource)?.label || pathSource;
    const tgtLabel = nodeById.get(pathTarget)?.label || pathTarget;
    document.getElementById('path-text').textContent =
      srcLabel + ' \u2192 ' + tgtLabel + ' (' + pathResult.hops.length + ' hops)';
    inspectPath(pathResult);
  } else {
    document.getElementById('path-text').textContent = 'No path found \u2014 click a new source...';
    pathSource = null; pathTarget = null; pathResult = null;
  }
  computeVisibility(); markDirty();
}

function exitPathMode() {
  if (!pathMode) return;
  pathMode = false; pathSource = null; pathTarget = null; pathResult = null;
  document.getElementById('btn-path').classList.remove('active');
  document.getElementById('path-banner').classList.remove('visible');
  computeVisibility(); markDirty();
}

function enterPathModeFrom(nodeId) {
  exitFocusMode();
  pathMode = true; pathSource = nodeId; pathTarget = null; pathResult = null;
  document.getElementById('btn-path').classList.add('active');
  document.getElementById('path-banner').classList.add('visible');
  document.getElementById('path-text').textContent =
    'Source: ' + (nodeById.get(nodeId)?.label || nodeId) + ' \u2014 click a target node...';
  computeVisibility(); markDirty();
}

function enterPathModeTo(nodeId) {
  exitFocusMode();
  pathMode = true; pathSource = null; pathTarget = nodeId; pathResult = null;
  document.getElementById('btn-path').classList.add('active');
  document.getElementById('path-banner').classList.add('visible');
  document.getElementById('path-text').textContent =
    'Target: ' + (nodeById.get(nodeId)?.label || nodeId) + ' \u2014 click a source node...';
  computeVisibility(); markDirty();
}

// ── Focus mode ──────────────────────────────────────────────────────────────
function enterFocusMode(nodeId) {
  exitPathMode();
  focusNodeId = nodeId;
  document.getElementById('focus-text').textContent = 'Focused: ' + (nodeById.get(nodeId)?.label || nodeId);
  document.getElementById('focus-banner').classList.add('visible');
  computeVisibility(); markDirty();
}

function exitFocusMode() {
  if (!focusNodeId) return;
  focusNodeId = null;
  document.getElementById('focus-banner').classList.remove('visible');
  computeVisibility(); markDirty();
}

// ── Inspector ───────────────────────────────────────────────────────────────
function inspectNode(d) {
  const panel = document.getElementById('inspector');
  const title = document.getElementById('inspector-title');
  const body = document.getElementById('inspector-body');
  panel.classList.add('open');
  title.textContent = d.label || d.id;
  body.textContent = '';

  const m = kindMeta.get(d.kind) || {};
  const badge = el('span', {className: 'kind-badge', textContent: m.label || d.kind});
  badge.style.background = m.color || '#888';
  body.appendChild(badge);

  const focusBtn = el('button', {textContent: 'Focus Neighbors', onclick: () => enterFocusMode(d.id)});
  focusBtn.style.cssText = 'background:#0f3460;border:1px solid #2a2a4a;border-radius:4px;' +
    'color:#e0e0e0;padding:4px 10px;font-size:12px;cursor:pointer;margin-left:6px';
  body.appendChild(focusBtn);

  const props = d.properties || {};
  const skip = new Set(['_icon', '_color']);
  const entries = Object.entries(props).filter(([k]) => !skip.has(k));
  if (entries.length) {
    const sec = sectionHeader('Properties');
    entries.forEach(([k, v]) => sec.appendChild(propRow(k, v)));
    body.appendChild(sec);
  }

  // Vulnerability section: show CVE details for Application nodes
  const vulnLinks = (adjOut.get(d.id) || []).filter(e => e.link.kind === 'rs_AffectedBy');
  if (vulnLinks.length) {
    const sec = sectionHeader('Vulnerabilities (' + vulnLinks.length + ')');
    vulnLinks.forEach(({target}) => {
      const vn = nodeById.get(target);
      if (!vn) return;
      const vp = vn.properties || {};
      const cvss = vp.cvss_score != null ? String(vp.cvss_score) : '?';
      const epss = vp.epss_score != null ? Number(vp.epss_score).toFixed(2) : '—';
      const kev = vp.in_kev ? ' KEV' : '';
      const label = (vp.cve_id || '?') + ' (CVSS ' + cvss + ', EPSS ' + epss + ')' + kev;
      const row = propRow(label, vp.title || '');
      // Color-code by severity
      if (vp.in_kev) row.style.borderLeft = '3px solid #FF4444';
      else if (vp.epss_score > 0.5) row.style.borderLeft = '3px solid #FF8800';
      sec.appendChild(row);
    });
    body.appendChild(sec);
  }

  const outgoing = adjOut.get(d.id) || [];
  const incoming = adjIn.get(d.id) || [];

  if (outgoing.length) {
    const sec = sectionHeader('Outgoing Edges (' + outgoing.length + ')');
    outgoing.slice(0, 20).forEach(({target, link}) => {
      const tgt = nodeById.get(target);
      const label = edgeKinds.get(link.kind)?.label || link.kind;
      sec.appendChild(propRow(label, tgt?.label || '?'));
    });
    if (outgoing.length > 20) sec.appendChild(propRow('...', '+' + (outgoing.length - 20) + ' more'));
    body.appendChild(sec);
  }

  if (incoming.length) {
    const sec = sectionHeader('Incoming Edges (' + incoming.length + ')');
    incoming.slice(0, 20).forEach(({source, link}) => {
      const src = nodeById.get(source);
      const label = edgeKinds.get(link.kind)?.label || link.kind;
      sec.appendChild(propRow(label, src?.label || '?'));
    });
    if (incoming.length > 20) sec.appendChild(propRow('...', '+' + (incoming.length - 20) + ' more'));
    body.appendChild(sec);
  }
}

function inspectPath(result) {
  const panel = document.getElementById('inspector');
  const title = document.getElementById('inspector-title');
  const body = document.getElementById('inspector-body');
  panel.classList.add('open');
  title.textContent = 'Shortest Path';
  body.textContent = '';
  const sec = sectionHeader(result.hops.length + ' Hops');
  result.hops.forEach((hop, i) => {
    const fromNode = nodeById.get(hop.from);
    const toNode = nodeById.get(hop.to);
    const edgeLabel = edgeKinds.get(hop.edge.kind)?.label || hop.edge.kind;
    sec.appendChild(propRow(
      (i + 1) + '. ' + (fromNode?.label || hop.from),
      edgeLabel + ' \u2192 ' + (toNode?.label || hop.to)
    ));
  });
  body.appendChild(sec);
}

function closeInspector() {
  document.getElementById('inspector').classList.remove('open');
}

// ── Context menu ────────────────────────────────────────────────────────────
function showContextMenu(event, d) {
  event.preventDefault(); event.stopPropagation();
  const menu = document.getElementById('context-menu');
  menu.textContent = '';

  menu.appendChild(el('div', {className: 'ctx-item', textContent: 'Find paths FROM this node',
    onclick: () => { hideContextMenu(); enterPathModeFrom(d.id); }}));
  menu.appendChild(el('div', {className: 'ctx-item', textContent: 'Find paths TO this node',
    onclick: () => { hideContextMenu(); enterPathModeTo(d.id); }}));
  menu.appendChild(el('div', {className: 'ctx-separator'}));
  menu.appendChild(el('div', {className: 'ctx-item', textContent: 'Show neighbors only',
    onclick: () => { hideContextMenu(); enterFocusMode(d.id); }}));
  menu.appendChild(el('div', {className: 'ctx-item', textContent: 'Center on this node',
    onclick: () => { hideContextMenu(); centerOnNode(d); }}));
  menu.appendChild(el('div', {className: 'ctx-separator'}));

  const ownedLabel = d.properties?.owned ? 'Unmark as owned' : 'Mark as owned';
  menu.appendChild(el('div', {className: 'ctx-item', textContent: ownedLabel,
    onclick: () => { hideContextMenu(); toggleOwned(d); }}));

  const tierHeader = el('div', {className: 'ctx-item', textContent: 'Set tier'});
  tierHeader.style.color = '#888'; tierHeader.style.cursor = 'default';
  menu.appendChild(tierHeader);
  ['T0', 'T1', 'T2', 'Clear'].forEach(t => {
    menu.appendChild(el('div', {className: 'ctx-sub', textContent: t,
      onclick: () => { hideContextMenu(); setTier(d, t === 'Clear' ? null : parseInt(t[1])); }}));
  });

  const rect = container.getBoundingClientRect();
  menu.style.left = (event.clientX - rect.left) + 'px';
  menu.style.top = (event.clientY - rect.top) + 'px';
  menu.style.display = 'block';
}

function hideContextMenu() { document.getElementById('context-menu').style.display = 'none'; }
document.addEventListener('click', hideContextMenu);

function centerOnNode(d) {
  transform = {
    x: W / 2 - d.x * 1.5,
    y: H / 2 - d.y * 1.5,
    k: 1.5
  };
  markDirty();
}

function toggleOwned(d) {
  if (!d.properties) d.properties = {};
  d.properties.owned = !d.properties.owned;
  markDirty();
}

function setTier(d, tier) {
  if (!d.properties) d.properties = {};
  d.properties.tier = tier;
  markDirty();
}

// ── Controls ────────────────────────────────────────────────────────────────
function resetZoom() {
  // Fit all visible nodes
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    if (!visibleNodeIds.has(n.id)) return;
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x);
    maxY = Math.max(maxY, n.y);
  });
  if (!isFinite(minX)) { transform = {x: 0, y: 0, k: 1}; markDirty(); return; }
  const pad = 80;
  const gw = maxX - minX + pad * 2;
  const gh = maxY - minY + pad * 2;
  const k = Math.min(W / gw, H / gh, 2);
  transform = {
    x: W / 2 - (minX + maxX) / 2 * k,
    y: H / 2 - (minY + maxY) / 2 * k,
    k: k
  };
  markDirty();
}

function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById('btn-labels').classList.toggle('active', showLabels);
  markDirty();
}

function toggleAttackPaths() {
  attackPathMode = !attackPathMode;
  document.getElementById('btn-attack').classList.toggle('active', attackPathMode);
  computeVisibility(); markDirty();
}

function toggleClustering() {
  clusterByType = !clusterByType;
  document.getElementById('btn-cluster').classList.toggle('active', clusterByType);

  if (clusterByType) {
    const kinds = [...kindMeta.keys()];
    const r = 600;
    kinds.forEach((kind, ki) => {
      const angle = 2 * Math.PI * ki / kinds.length;
      const cx = 1000 + Math.cos(angle) * r;
      const cy = 1000 + Math.sin(angle) * r;
      nodes.forEach((n, j) => {
        if (n.kind === kind) {
          const a2 = 2 * Math.PI * j / nodes.length;
          n.x = cx + Math.cos(a2) * 80 + (Math.random() - 0.5) * 40;
          n.y = cy + Math.sin(a2) * 80 + (Math.random() - 0.5) * 40;
        }
      });
    });
  }
  // Re-fit view
  resetZoom();
}

let vulnFilterActive = false;
function toggleVulnFilter() {
  vulnFilterActive = !vulnFilterActive;
  document.getElementById('btn-vuln').classList.toggle('active', vulnFilterActive);
  if (vulnFilterActive) {
    // Show only nodes that have AFFECTED_BY edges (or are Vulnerability nodes)
    const vulnNodeIds = new Set();
    links.forEach(l => {
      if (l.kind === 'rs_AffectedBy') {
        vulnNodeIds.add(l.source);
        vulnNodeIds.add(l.target);
      }
    });
    visibleNodeIds.clear();
    vulnNodeIds.forEach(id => visibleNodeIds.add(id));
    // Also show edges between visible nodes
    visibleLinkSet.clear();
    links.forEach((l, i) => {
      if (visibleNodeIds.has(l.source) && visibleNodeIds.has(l.target)) visibleLinkSet.add(i);
    });
  } else {
    rebuildVisibility();
  }
  dirty = true;
}

function exportPNG() {
  const exportCanvas = document.createElement('canvas');
  const scale = 2;
  exportCanvas.width = W * scale;
  exportCanvas.height = H * scale;
  const ectx = exportCanvas.getContext('2d');
  ectx.fillStyle = '#1a1a2e';
  ectx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

  // Draw at current transform
  ectx.translate(transform.x * scale, transform.y * scale);
  ectx.scale(transform.k * scale, transform.k * scale);

  // Draw edges
  links.forEach((l, i) => {
    if (!visibleLinkSet.has(i)) return;
    const src = nodeById.get(l.source);
    const tgt = nodeById.get(l.target);
    if (!src || !tgt) return;
    const trav = l.properties?._traversable;
    ectx.beginPath();
    ectx.moveTo(src.x, src.y);
    ectx.lineTo(tgt.x, tgt.y);
    ectx.strokeStyle = trav ? '#6ea8fe' : '#555';
    ectx.globalAlpha = trav ? 0.6 : 0.3;
    ectx.lineWidth = trav ? 1.5 : 0.8;
    ectx.stroke();
  });

  ectx.globalAlpha = 1;

  // Draw nodes
  nodes.forEach(n => {
    if (!visibleNodeIds.has(n.id)) return;
    const r = nodeRadius(n);
    const color = n.properties?._color || kindMeta.get(n.kind)?.color || '#888';
    ectx.beginPath();
    ectx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ectx.fillStyle = color;
    ectx.fill();
    ectx.strokeStyle = '#2a2a4a';
    ectx.lineWidth = 1.5;
    ectx.stroke();
    if (n.label) {
      ectx.font = '10px sans-serif';
      ectx.textAlign = 'center';
      ectx.textBaseline = 'top';
      ectx.fillStyle = '#ccc';
      ectx.fillText(n.label.length > 22 ? n.label.slice(0, 21) + '\u2026' : n.label, n.x, n.y + r + 4);
    }
  });

  exportCanvas.toBlob(blob => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'rootstock-graph.png'; a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// ── Keyboard shortcuts ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const isInput = document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA';

  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('search').focus();
    return;
  }

  if (e.key === 'Escape') {
    if (pathMode) { exitPathMode(); return; }
    if (focusNodeId) { exitFocusMode(); return; }
    if (document.getElementById('inspector').classList.contains('open')) { closeInspector(); return; }
    if (searchTerm) {
      document.getElementById('search').value = '';
      searchTerm = '';
      computeVisibility(); markDirty();
      return;
    }
    if (isInput) document.activeElement.blur();
    return;
  }

  if (isInput) return;

  if (e.key === 'p') { togglePathMode(); return; }
  if (e.key === 'a') { toggleAttackPaths(); return; }
  if (e.key === 'l') { toggleLabels(); return; }
  if (e.key === 'r') { resetZoom(); return; }

  const num = parseInt(e.key);
  if (num >= 1 && num <= 9) {
    const kinds = [...kindMeta.keys()].sort((a, b) => kindMeta.get(b).count - kindMeta.get(a).count);
    if (num <= kinds.length) {
      const kind = kinds[num - 1];
      const cb = document.querySelector('#node-filters input[data-kind="' + kind + '"]');
      if (cb) {
        cb.checked = !cb.checked;
        if (cb.checked) activeNodeKinds.add(kind);
        else activeNodeKinds.delete(kind);
        computeVisibility(); markDirty();
      }
    }
  }
});

// ── Initial setup ───────────────────────────────────────────────────────────
computeVisibility();
// Fit to visible nodes on load
setTimeout(resetZoom, 50);

// Stats
const attackEdgeCount = [...edgeKinds.values()].filter(e => e.traversable).reduce((s,e) => s + e.count, 0);
document.getElementById('stats').textContent =
  nodes.length + ' nodes \u00b7 ' + links.length + ' edges \u00b7 ' + attackEdgeCount + ' attack edges';

// ── Live API integration ─────────────────────────────────────────────────
const isLive = typeof __ROOTSTOCK_LIVE__ !== 'undefined';

if (isLive) {
  // Enable live UI elements
  document.getElementById('query-section').classList.add('live');
  document.getElementById('live-actions').classList.add('live');

  // Fetch and populate query browser
  fetch(API_BASE + '/api/queries')
    .then(r => r.json())
    .then(queries => {
      const list = document.getElementById('query-list');
      const grouped = {
        'Red Team': queries.filter(q => q.category === 'Red Team'),
        'Blue Team': queries.filter(q => q.category === 'Blue Team'),
        'Forensic': queries.filter(q => q.category === 'Forensic'),
      };
      Object.entries(grouped).forEach(([cat, qs]) => {
        qs.forEach(q => {
          const catClass = cat === 'Red Team' ? 'red' : cat === 'Blue Team' ? 'blue' : 'forensic';
          const sevClass = q.severity.toLowerCase();
          const item = el('div', {className: 'query-item', onclick: () => runLiveQuery(q)}, [
            el('span', {className: 'query-id', textContent: q.id}),
            el('span', {className: 'severity-dot ' + sevClass}),
            el('span', {className: 'query-name', textContent: q.name}),
            el('span', {className: 'cat-badge ' + catClass, textContent: cat.split(' ')[0]}),
          ]);
          item.title = q.purpose || q.name;
          list.appendChild(item);
        });
      });
    })
    .catch(err => console.warn('Failed to load queries:', err));
}

function runLiveQuery(q) {
  if (!isLive) return;
  const panel = document.getElementById('results-panel');
  const body = document.getElementById('results-body');
  const meta = document.getElementById('results-meta');
  document.getElementById('results-title').textContent = '[' + q.id + '] ' + q.name;
  meta.textContent = 'Loading...';
  body.textContent = '';
  panel.classList.add('open');

  fetch(API_BASE + '/api/queries/' + q.id + '/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({params: {}})
  })
    .then(r => r.json())
    .then(data => {
      meta.textContent = data.count + ' row(s) \u00b7 ' + q.category + ' \u00b7 ' + q.severity;
      if (!data.rows || data.rows.length === 0) {
        body.textContent = '';
        body.appendChild(el('div', {textContent: 'No results.', className: 'prop-row'}));
        if (q.severity === 'Critical' || q.severity === 'High') {
          body.appendChild(el('div', {
            textContent: '\u2713 No findings \u2014 positive security result.',
            className: 'prop-row'
          }));
        }
        return;
      }
      // Build table
      const headers = Object.keys(data.rows[0]);
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const hrow = document.createElement('tr');
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        hrow.appendChild(th);
      });
      thead.appendChild(hrow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      data.rows.forEach(row => {
        const tr = document.createElement('tr');
        headers.forEach(h => {
          const td = document.createElement('td');
          const val = row[h];
          td.textContent = Array.isArray(val) ? val.join(', ') : String(val ?? '');
          td.title = td.textContent;
          tr.appendChild(td);
        });
        // Click row to highlight matching nodes
        tr.style.cursor = 'pointer';
        tr.addEventListener('click', () => highlightQueryResult(row));
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      body.textContent = '';
      body.appendChild(table);
    })
    .catch(err => {
      meta.textContent = 'Error: ' + err.message;
    });
}

function highlightQueryResult(row) {
  // Try to find matching nodes by bundle_id or name
  const bid = row.bundle_id || row.app_bundle_id;
  const name = row.app || row.name || row.attacker || row.victim_user;
  let matchId = null;
  if (bid) {
    for (const n of nodes) {
      if (n.properties?.bundle_id === bid) { matchId = n.id; break; }
    }
  }
  if (!matchId && name) {
    for (const n of nodes) {
      if (n.label === name || n.properties?.name === name) { matchId = n.id; break; }
    }
  }
  if (matchId) {
    const node = nodeById.get(matchId);
    if (node) { centerOnNode(node); selectedNode = node; inspectNode(node); markDirty(); }
  }
}

function closeResults() {
  document.getElementById('results-panel').classList.remove('open');
}

function liveRefresh() {
  if (!isLive) return;
  fetch(API_BASE + '/api/graph')
    .then(r => r.json())
    .then(data => {
      const newNodes = data.graph?.nodes || [];
      const newEdges = data.graph?.edges || [];
      // Update node positions and properties in place
      const newById = new Map(newNodes.map(n => [n.id, n]));
      nodes.forEach(n => {
        const updated = newById.get(n.id);
        if (updated) Object.assign(n.properties, updated.properties);
      });
      computeVisibility(); markDirty();
      document.getElementById('stats').textContent =
        nodes.length + ' nodes \u00b7 ' + links.length + ' edges (refreshed)';
    })
    .catch(err => console.warn('Refresh failed:', err));
}

function liveTierClassify() {
  if (!isLive) return;
  fetch(API_BASE + '/api/tier-classify', {method: 'POST'})
    .then(r => r.json())
    .then(data => {
      alert('Tier classification complete: T0=' + data.tier0 + ' T1=' + data.tier1 + ' T2=' + data.tier2);
      liveRefresh();
    })
    .catch(err => console.warn('Tier classify failed:', err));
}

function liveShowOwned() {
  if (!isLive) return;
  fetch(API_BASE + '/api/owned')
    .then(r => r.json())
    .then(data => {
      if (data.count === 0) { alert('No owned nodes.'); return; }
      // Highlight owned nodes by selecting all matching
      data.owned.forEach(item => {
        const name = item.name;
        nodes.forEach(n => {
          if (n.properties?.name === name || n.properties?.bundle_id === name) {
            if (!n.properties) n.properties = {};
            n.properties.owned = true;
          }
        });
      });
      markDirty();
      alert(data.count + ' owned node(s) highlighted.');
    })
    .catch(err => console.warn('Show owned failed:', err));
}

// Override toggleOwned in live mode to persist to API
if (isLive) {
  const _origToggleOwned = toggleOwned;
  toggleOwned = function(d) {
    const wasOwned = d.properties?.owned;
    _origToggleOwned(d);
    if (wasOwned) {
      // Clear owned
      const body = {};
      if (d.properties?.bundle_id) body.bundle_ids = [d.properties.bundle_id];
      else if (d.properties?.name && d.kind === 'rs_User') body.usernames = [d.properties.name];
      else { return; }
      fetch(API_BASE + '/api/clear-owned', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      }).catch(err => console.warn('Clear owned failed:', err));
    } else {
      // Mark owned
      const body = {};
      if (d.properties?.bundle_id) body.bundle_ids = [d.properties.bundle_id];
      else if (d.properties?.name && d.kind === 'rs_User') body.usernames = [d.properties.name];
      else { return; }
      fetch(API_BASE + '/api/mark-owned', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      }).catch(err => console.warn('Mark owned failed:', err));
    }
  };
}

// Keyboard: Escape closes results panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('results-panel').classList.contains('open')) {
    closeResults();
    e.stopPropagation();
  }
}, true);
</script>
